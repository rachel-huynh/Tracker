<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFE Assessment Hub — Plaza Hotel</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
if (typeof XLSX === 'undefined') {
  document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"><\/script>');
}
</script>
<style>
:root{
  --purple:#7030a0; --purple-light:#f3ecf9; --purple-mid:#c9a8e0;
  --yellow:#bf9000; --yellow-light:#fff8e1;
  --green:#2e7d32; --green-light:#e8f5e9;
  --red:#c62828; --red-light:#ffebee;
  --amber:#e65100; --amber-light:#fff3e0;
  --ink:#1a1a2e; --muted:#6b7280; --line:#e5e7eb; --bg:#f6f7fb; --card:#ffffff;
  --blue:#1565c0; --blue-light:#e3f2fd;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI",system-ui,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
h1,h2,h3{font-weight:600}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit;font-size:13px;border:1px solid var(--line);border-radius:6px;padding:6px 8px;background:#fff;color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--purple-mid)}
textarea{resize:vertical;min-height:52px}
label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:3px}

/* Header */
header{background:linear-gradient(135deg,#4a1d6e,#7030a0 65%,#9455c4);color:#fff;padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
header h1{font-size:19px}
header .sub{font-size:12px;opacity:.85}
header .spacer{flex:1}
header .hbtn{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:8px;padding:7px 14px;font-size:13px}
header .hbtn:hover{background:rgba(255,255,255,.25)}

/* Nav tabs */
nav{display:flex;gap:2px;background:#fff;border-bottom:2px solid var(--line);padding:0 16px;overflow-x:auto}
nav button{background:none;border:none;padding:12px 16px;font-size:13.5px;color:var(--muted);border-bottom:3px solid transparent;white-space:nowrap}
nav button.active{color:var(--purple);border-bottom-color:var(--purple);font-weight:600}
nav button:hover{color:var(--purple)}
nav .badge{background:var(--purple-light);color:var(--purple);border-radius:10px;padding:1px 7px;font-size:11px;margin-left:5px}

main{padding:18px 24px;max-width:1500px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(20,20,40,.05)}
.card h2{font-size:15px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.card h3{font-size:13.5px;margin:12px 0 6px;color:#333}
.grid{display:grid;gap:10px}
.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}.g5{grid-template-columns:repeat(5,1fr)}.g6{grid-template-columns:repeat(6,1fr)}
@media(max-width:900px){.g3,.g4,.g5,.g6{grid-template-columns:repeat(2,1fr)}}
.field input,.field select,.field textarea{width:100%}
.muted{color:var(--muted);font-size:12px}
.mono{font-family:Consolas,monospace}

/* Buttons */
.btn{border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px}
.btn-p{background:var(--purple);color:#fff}.btn-p:hover{background:#5b2482}
.btn-o{background:#fff;color:var(--purple);border:1.5px solid var(--purple)}
.btn-g{background:var(--green);color:#fff}
.btn-gray{background:#eceef2;color:#444}
.btn-r{background:var(--red-light);color:var(--red);border:1px solid #f3c1c1}
.btn-sm{padding:4px 10px;font-size:12px;border-radius:6px}

/* Pills / status */
.pill{display:inline-block;border-radius:999px;padding:2px 10px;font-size:11.5px;font-weight:600}
.pill.ok{background:var(--green-light);color:var(--green)}
.pill.bad{background:var(--red-light);color:var(--red)}
.pill.warn{background:var(--amber-light);color:var(--amber)}
.pill.info{background:var(--blue-light);color:var(--blue)}
.pill.purple{background:var(--purple-light);color:var(--purple)}
.pill.gray{background:#eceef2;color:#555}
.pill.yellow{background:var(--yellow-light);color:var(--yellow)}

/* Stage tracker */
.stages{display:flex;gap:0;align-items:center;flex-wrap:wrap}
.stage{display:flex;align-items:center}
.stage .dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid var(--line);background:#fff;color:var(--muted);cursor:pointer;transition:.15s}
.stage .dot.done{background:var(--green);border-color:var(--green);color:#fff}
.stage .dot.current{border-color:var(--purple);color:var(--purple);box-shadow:0 0 0 3px var(--purple-light)}
.stage .dot.na{background:#f1f1f4;border-style:dashed}
.stage .lbl{font-size:10.5px;text-align:center;color:var(--muted);margin-top:3px;max-width:64px}
.stage .conn{width:26px;height:2px;background:var(--line);margin:0 2px 16px}
.stage .conn.done{background:var(--green)}
.stage .wrap{display:flex;flex-direction:column;align-items:center}

/* Tables */
table.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.tbl th{background:#f4f2fa;color:#4a3a63;text-align:left;padding:7px 8px;border:1px solid var(--line);font-size:11.5px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.tbl td{padding:6px 8px;border:1px solid var(--line);vertical-align:top}
.tbl tr:nth-child(even) td{background:#fafafd}
.tbl input,.tbl select{width:100%;min-width:60px;border:1px solid transparent;background:transparent;padding:3px 4px}
.tbl input:hover,.tbl select:hover{border-color:var(--line);background:#fff}
.tbl input:focus,.tbl select:focus{border-color:var(--purple);background:#fff}
.num{text-align:right;font-variant-numeric:tabular-nums}
.tblwrap{overflow-x:auto}

/* Project cards */
.pcard{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--purple);border-radius:12px;padding:14px 18px;margin-bottom:12px;cursor:pointer;transition:.15s}
.pcard:hover{box-shadow:0 4px 14px rgba(80,40,120,.12);transform:translateY(-1px)}
.pcard .top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.pcard .code{font-family:Consolas,monospace;font-weight:700;color:var(--purple);font-size:14px}
.pcard .name{font-weight:600;font-size:15px}

/* Section blocks yellow/purple */
.sheet{border:1px solid var(--line);border-radius:10px;margin-bottom:14px;overflow:hidden}
.sheet>.shead{display:flex;align-items:center;gap:10px;padding:10px 14px;font-weight:700;font-size:13.5px;cursor:pointer;user-select:none}
.sheet.ydept>.shead{background:var(--yellow-light);color:#7a5c00;border-bottom:1px solid #f0e2b0}
.sheet.pmine>.shead{background:var(--purple-light);color:var(--purple);border-bottom:1px solid var(--purple-mid)}
.sheet>.sbody{padding:14px;background:#fff}
.sheet.collapsed>.sbody{display:none}
.shead .tag{font-size:10px;border-radius:4px;padding:2px 6px;font-weight:700;letter-spacing:.5px}
.ydept .tag{background:#e7c855;color:#5b4400}
.pmine .tag{background:var(--purple);color:#fff}
.shead .caret{margin-left:auto;transition:.2s}
.collapsed .shead .caret{transform:rotate(-90deg)}

/* verdict box */
.verdict{border-radius:10px;padding:12px 16px;margin:10px 0;font-size:13.5px;border:1.5px solid}
.verdict.ok{background:var(--green-light);border-color:#a5d6a7;color:#1b5e20}
.verdict.bad{background:var(--red-light);border-color:#ef9a9a;color:#b71c1c}
.verdict.warn{background:var(--amber-light);border-color:#ffcc80;color:#e65100}
.verdict ul{margin:6px 0 0 18px}

/* KPI tiles */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.kpi .v{font-size:22px;font-weight:700;color:var(--purple)}
.kpi .l{font-size:11.5px;color:var(--muted);margin-top:2px}

/* drop zone */
.drop{border:2px dashed var(--purple-mid);border-radius:14px;padding:34px;text-align:center;background:var(--purple-light);color:var(--purple);font-size:14px;cursor:pointer;transition:.15s}
.drop.hover{background:#e7d9f5}
.drop b{font-size:16px}

/* toast */
#toast{position:fixed;bottom:22px;right:22px;z-index:99;display:flex;flex-direction:column;gap:8px}
.toastmsg{background:#26203a;color:#fff;border-radius:10px;padding:11px 18px;font-size:13px;box-shadow:0 6px 18px rgba(0,0,0,.3);animation:fadein .25s}
.toastmsg.err{background:#8e2424}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1}}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(20,15,35,.5);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:14px;max-width:860px;width:100%;max-height:88vh;overflow:auto;padding:22px}

.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.toolbar .spacer{flex:1}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.hidden{display:none!important}
.link{color:var(--purple);cursor:pointer;text-decoration:underline}
.small{font-size:12px}
.checkline{display:flex;align-items:center;gap:6px;font-size:13px}
.checkline input{width:auto}

/* PRINT */
#printArea{display:none}
@media print{
  body>*:not(#printArea){display:none!important}
  #printArea{display:block!important;font-size:11.5px;color:#000}
  #printArea .prpage{page-break-after:always;padding:0}
  #printArea h1{font-size:17px}
  #printArea h2{font-size:13.5px;background:#eee;padding:4px 8px;margin:12px 0 6px;border-left:4px solid #7030a0}
  #printArea table{width:100%;border-collapse:collapse;font-size:10.5px}
  #printArea th,#printArea td{border:1px solid #999;padding:4px 6px;text-align:left;vertical-align:top}
  #printArea th{background:#f0ebf7}
  #printArea .phead{display:flex;justify-content:space-between;border-bottom:2px solid #7030a0;padding-bottom:8px;margin-bottom:10px}
  #printArea .sig{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:26px;text-align:center;font-size:10px}
  #printArea .sig div{border-top:1px solid #777;padding-top:4px;margin-top:48px}
  #printArea .band{background:#d9d2e9;font-weight:700;padding:4px 8px;border:1px solid #888;margin-top:12px;font-size:11px;letter-spacing:.4px}
  #printArea .lbl-c{background:#efefef;font-weight:700;font-size:9.5px;text-transform:uppercase}
  #printArea .codebox{float:right;border:1px solid #888;font-size:10px;margin-bottom:6px}
  #printArea .codebox td,#printArea .codebox th{border:1px solid #888;padding:3px 10px;text-align:center}
  #printArea .consent{margin-top:18px;font-size:10px}
  #printArea .consent .row{display:grid;gap:10px;text-align:center;margin-top:8px}
  #printArea .consent .cell{padding-top:2px}
  #printArea .consent .line{margin-top:58px;border-top:0}
  #printArea .vn{font-style:italic;color:#333}
  @page{size:A4;margin:14mm 11mm}
}
</style>
</head>
<body>
<header>
  <div>
    <h1>🏨 FFE Assessment Hub</h1>
    <div class="sub">Plaza Hotel Company Limited — Owner assessment of FFE procurement (PA · MC · Asset Codes)</div>
  </div>
  <div class="spacer"></div>
  <button class="hbtn" onclick="saveWorkspace(true)">💾 Save</button>
  <button class="hbtn" onclick="exportJSON()">⬇ Export JSON</button>
  <button class="hbtn" onclick="document.getElementById('importJsonFile').click()">⬆ Import JSON</button>
  <input type="file" id="importJsonFile" accept=".json" class="hidden" onchange="importJSONFile(this)">
</header>
<nav id="nav"></nav>
<main id="main"></main>
<div id="toast"></div>
<div id="printArea"></div>
<script>
/* =================== REFERENCE DATA (from Asset code.xlsx & form Menu) =================== */
const UNITS = [
  {code:'PHCL',en:'Plaza Hotel Ltd.,',vn:'Công ty TNHH Liên Doanh Khách Sạn Plaza',level:'TCT'},
  {code:'JVC',en:'JVC Office',vn:'Văn phòng đại diện chủ đầu tư',level:'CN/VP'},
  {code:'CEN',en:'Central Plaza',vn:'Cao ốc văn phòng Central Plaza',level:'CN/VP'},
  {code:'SOF',en:'Sofitel Saigon Plaza',vn:'Khách sạn Sofitel SG Plaza',level:'CN/VP'},
  {code:'FOD',en:'Front Office Department',vn:'Bộ phận tiền sảnh',level:'Dept1'},
  {code:'HKD',en:'House Keeping Department',vn:'Bộ phận quản gia',level:'Dept1'},
  {code:'FBD',en:'Food & Beverage Department',vn:'Bộ phận F&B',level:'Dept1'},
  {code:'KIT',en:'Kitchen Department',vn:'Bộ phận bếp',level:'Dept1'},
  {code:'ENG',en:'Engineering Department',vn:'Bộ phận kỹ thuật',level:'Dept1'},
  {code:'ADM',en:'Administration & Human Resource Department',vn:'Bộ phận hành chính, nhân sự',level:'Dept1'},
  {code:'SMD',en:'Sale & Marketing Department',vn:'Bộ phận quảng cáo, bán hàng',level:'Dept1'},
  {code:'FIN',en:'Finance Department',vn:'Bộ phận tài chính, kế toán',level:'Dept1'},
  {code:'ITD',en:'IT Department',vn:'Bộ phận IT',level:'Dept2'},
  {code:'SEC',en:'Security Department',vn:'Bộ phận an ninh',level:'Dept2'}
];
const ASSET_GROUPS = [
  {code:'C2111',en:'Buildings and structures',vn:'Nhà cửa, vật kiến trúc',types:['BUL','STR','INF'],intangible:false},
  {code:'C2112',en:'Machinery and equipment',vn:'Máy móc và thiết bị',types:['MES','FFP','ITO','KME','FUR','SME','OME'],intangible:false},
  {code:'C2113',en:'Transportation and transmission vehicles',vn:'Trang thiết bị và phương tiện vận tải',types:['TTV'],intangible:false},
  {code:'C2114',en:'Office equipment, management tools',vn:'Thiết bị, công cụ quản lý',types:['ITM','OEM'],intangible:false},
  {code:'C2115',en:'Perennial trees, working & producing animals',vn:'Cây lâu năm, súc vật làm việc',types:['PWP'],intangible:false},
  {code:'C2118',en:'Other tangible asset',vn:'TSCĐ hữu hình khác',types:['OTA'],intangible:false},
  {code:'C2131',en:'Land use rights',vn:'Quyền sử dụng đất',types:['LUR'],intangible:true},
  {code:'C2132',en:'Copyrights',vn:'Quyền phát hành',types:['CPR'],intangible:true},
  {code:'C2133',en:'Patent',vn:'Bản quyền, bằng sáng chế',types:['PAT'],intangible:true},
  {code:'C2134',en:'Trademarks, trade names',vn:'Nhãn hiệu độc quyền',types:['TMK'],intangible:true},
  {code:'C2135',en:'Computer software',vn:'Chương trình, phần mềm',types:['CTP'],intangible:true},
  {code:'C2136',en:'License & right concession permits',vn:'Giấy phép nhượng quyền',types:['LRP'],intangible:true},
  {code:'C2138',en:'Other intangible asset',vn:'TSCĐ vô hình khác',types:['OIA'],intangible:true},
  {code:'C2421',en:'Short-term tools & supplies (CCDC)',vn:'Thiết bị, CCDC ngắn hạn',types:['STU','STG','STG-QR'],intangible:false},
  {code:'C2422',en:'Long-term tools & supplies (CCDC)',vn:'Thiết bị, CCDC dài hạn',types:['LTU','LTG','LTG-QR'],intangible:false}
];
const ASSET_TYPES = {
  BUL:'Building', STR:'Other structure', INF:'Infrastructure', MES:'M&E Systems',
  FFP:'Fire Fighting & Prevention', ITO:'IT Equipment (operation)', KME:'Kitchen Machinery & Equipment',
  FUR:'Furniture, artworks', SME:'Sanitary Machinery & Equipment', OME:'Other Machinery & Equipment',
  TTV:'Transportation vehicles', ITM:'IT Equipment (management)', OEM:'Other mgmt equipment',
  PWP:'Perennial trees/animals', OTA:'Other tangible', LUR:'Land use rights', CPR:'Copyrights',
  PAT:'Patent', TMK:'Trademarks', CTP:'Computer software', LRP:'Licenses', OIA:'Other intangible',
  STU:'Short-term tools (by code)', LTU:'Long-term tools (by code)', STG:'Short-term tools (by qty)',
  LTG:'Long-term tools (by qty)', 'STG-QR':'Short-term (shared QR)', 'LTG-QR':'Long-term (shared QR)'
};
const RISK_CATEGORIES = ["People's Health & Safety","Technical Issues","Reputation Damage","Incident Acknowledgement","Periodic Internal Assessment","Legal Compliance","HACCP Fail Point","Public Negative Feedback","Employee's Complaint","Financial Efficiency","Operational Inconsistency","Competitive Advantage Lost","Touchpoints","Productivity"];
const PROCUREMENT_TYPES = ['Competitive Quotation','Direct Appointment','Open Tender','Limited Tender'];
const MC_CONCLUSIONS = [
  'The price of the items on the selected quotation is assessed to be acceptable within the allowable variance.',
  'The price of the items on the selected quotation exceeds the allowable variance. It is recommended to reevaluate the current unit prices in the quotation.',
  'This is a project where market prices cannot be checked because the items are related to technical factors, have a construction-related nature, or are specialized products with prices not publicly disclosed.'
];
const PA_SUGGESTIONS = {Critical:'Need to be processed immediately',High:'Need to be processed ASAP',Medium:'Need to be processed as scheduled',Low:'Consider to be processed next term'};
const DEFAULT_COMMITTEES = [
  {member:'Đinh Hoàng Duy',title:'General Manager',rep:'Joint Venture Company Office'},
  {member:'Nguyễn Trung Khánh',title:'Chief Accountant',rep:'Joint Venture Company Office'},
  {member:'Tống Quốc Vĩnh',title:'Maintenance Manager',rep:'Joint Venture Company Office'},
  {member:'Huỳnh Thị Trúc Dịu',title:'Project Assistant',rep:'Joint Venture Company Office'}
];
function deriveDocCode(p, prefix){
  const prCode=(p.pr&&p.pr.code||'').trim();
  if(/^PR\./i.test(prCode)) return prefix+prCode.slice(2);
  const pc=(p.code||'').trim(); const parts=pc.split('.');
  if(parts.length>=2) return prefix+'.'+parts.slice(1).join('.');
  return '';
}
const STAGE_DEFS = [
  {k:'PR',label:'PR received',who:'dept'},
  {k:'PA',label:'PA assessment',who:'me'},
  {k:'QC',label:'QC bid compare',who:'dept'},
  {k:'MC',label:'Market check',who:'me'},
  {k:'PO',label:'PO / Contract',who:'dept'},
  {k:'AH',label:'Asset handover',who:'dept'},
  {k:'AC',label:'Asset codes / labels',who:'me'},
  {k:'DONE',label:'Closed',who:'me'}
];
function riskLevel(score){ if(score>=16) return 'Critical'; if(score>=12) return 'High'; if(score>=8) return 'Medium'; return 'Low'; }

/* =================== STATE =================== */
const LS_KEY='ffeHubWorkspace_v1';
let ws = null;
function defaultWorkspace(){ return {
  version:1, updatedAt:new Date().toISOString(),
  settings:{exrate:26000, usdLimit:50000, overrunPctLimit:10, lowValueVnd:3000000, emergencyRisk:16, mcTolerance:10, pvRate:4.6, jsonbinId:'', jsonbinKey:''},
  projects:[], capex:[], register:[],
  refs:{locations:[], itemNames:[], vendors:[]}
};}
function loadWorkspace(){ try{ const raw=localStorage.getItem(LS_KEY); ws = raw? JSON.parse(raw) : defaultWorkspace(); }catch(e){ ws = defaultWorkspace(); } if(!ws.settings) ws.settings=defaultWorkspace().settings; if(!ws.refs) ws.refs=defaultWorkspace().refs; }
function saveWorkspace(notify){ ws.updatedAt=new Date().toISOString(); try{ localStorage.setItem(LS_KEY, JSON.stringify(ws)); if(notify) toast('Workspace saved locally ✓'); }catch(e){ toast('Save failed: '+e.message,true); } }

/* =================== UTILITIES =================== */
function toast(msg,err){ const t=document.createElement('div'); t.className='toastmsg'+(err?' err':''); t.textContent=msg; document.getElementById('toast').appendChild(t); setTimeout(()=>t.remove(), err?6000:3200); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function num(v){ if(v==null||v==='')return 0; const n=typeof v==='number'?v:parseFloat(String(v).replace(/[,\s]/g,'')); return isNaN(n)?0:n; }
function fmtVnd(v){ if(v==null||v==='')return ''; return num(v).toLocaleString('en-US',{maximumFractionDigits:0}); }
function fmtUsd(v){ return num(v).toLocaleString('en-US',{maximumFractionDigits:0}); }
function fmtPct(v){ return (num(v)*100).toFixed(1)+'%'; }
function excelDate(serial){ if(serial==null||serial==='')return ''; if(typeof serial==='string' && /\d{4}-\d{2}-\d{2}/.test(serial)) return serial.slice(0,10); const n=num(serial); if(!n||n<20000||n>60000) return String(serial); const d=new Date(Date.UTC(1899,11,30)+n*86400000); return d.toISOString().slice(0,10); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function uid(){ return 'p'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function clean(v){ if(v==null) return ''; const s=String(v).trim(); return (s==='0'&&typeof v!=='number')?'':s; }
function cellStr(v){ if(v==null||v===0||v==='0') return ''; return String(v).trim(); }

/* =================== XLSX PARSING =================== */
function sheetGrid(wb, name){
  const sh = wb.Sheets[name]; if(!sh) return null;
  return XLSX.utils.sheet_to_json(sh, {header:1, raw:true, defval:null});
}
function findCell(grid, pattern, opts){
  opts=opts||{};
  const re = pattern instanceof RegExp ? pattern : new RegExp('^\\s*'+pattern.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\s*$','i');
  for(let r=opts.fromRow||0;r<grid.length;r++){ const row=grid[r]; if(!row)continue;
    for(let c=0;c<row.length;c++){ const v=row[c]; if(v!=null && typeof v==='string' && re.test(v.trim())) return {r,c,v}; } }

function headerCols(grid, headerNames, fromRow){

function parseQC(grid){

/* ============ main form upload handler ============ */
function handleFormFile(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:false});
      importWorkbook(wb, file.name);

function importWorkbook(wb, fname){
  const prGrid=sheetGrid(wb,'PR');
  if(!prGrid){
    const added=parseCapexList(wb); parseMenuRefs(wb);
    if(added){ toast(`No PR sheet — imported ${added} CAPEX lines from ${fname}`); saveWorkspace(); route(); return; }
    toast('This workbook has no PR sheet and no Capex List — nothing imported.',true); return;
  }
  const pr=parsePR(prGrid);
  const rr=parseRR(sheetGrid(wb,'RR'));
  const qc=parseQC(sheetGrid(wb,'QC'));
  const po=parsePOAH(sheetGrid(wb,'PO'),'po');
  const ah=parsePOAH(sheetGrid(wb,'AH'),'ah');
  const paSheet=parsePA(sheetGrid(wb,'PA'));
  parseMenuRefs(wb);
  const capexAdded=parseCapexList(wb);
  // find existing project by projectCode+sub
  const key=(pr.projectCode||fname);
  let p=ws.projects.find(x=>x.key===key);
  const isNew=!p;
  if(!p){ p={id:uid(), key, stages:{}, createdAt:todayStr()}; ws.projects.push(p); }
  p.fileName=fname;
  p.pr=pr; if(rr)p.rr=rr; if(qc)p.qc=Object.assign(p.qc||{},qc); if(po)p.po=po; if(ah)p.ah=ah;
  p.code=pr.projectCode||p.code; p.name=pr.name||p.name; p.dept=pr.deptCode; p.deptName=pr.deptName;
  // seed stages
  p.stages.PR=p.stages.PR||{done:true,date:pr.requestDate||todayStr()};
  if(qc) p.stages.QC=p.stages.QC||{done:true,date:qc.date||todayStr()};
  if(po) p.stages.PO=p.stages.PO||{done:true,date:po.date||todayStr()};
  if(ah) p.stages.AH=p.stages.AH||{done:true,date:ah.date||todayStr()};
  // build PA recommendation
  buildPA(p, paSheet);
  if(qc) buildMC(p);
  if(ah) buildALR(p);
  saveWorkspace();
  toast((isNew?'Imported new project ':'Updated project ')+ (p.code||'') + (capexAdded?` (+${capexAdded} CAPEX lines)`:''));
  state.view='project'; state.projectId=p.id; route();
}

/* ============ PURPLE BUILDERS ============ */
function capexMatch(p){
  if(!p.pr) return null;
  const code=(p.pr.projectCode||'').trim();
  if(!code) return null;
  // exact, or same dept+no different year
  let m=ws.capex.find(c=>c.projectCode&&code.startsWith(c.projectCode));
  if(m) return m;
  const parts=code.split('.'); // FFE.KIT.02.2026
  if(parts.length>=3){ const pref=parts[0]+'.'+parts[1]+'.'+parts[2]; m=ws.capex.find(c=>c.projectCode&&c.projectCode.startsWith(pref)); }
  return m||null;
}
function buildPA(p, imported){
  const pr=p.pr, s=ws.settings;
  const old=p.pa||{};
  const cx=capexMatch(p);
  const pa={
    code: old.code || (imported&&imported.code) || deriveDocCode(p,'PA'),
    date: old.date|| (imported&&imported.date) || todayStr(),
    committees: (old.committees&&old.committees.length&&old.committees.some(c=>c.member))?old.committees:DEFAULT_COMMITTEES.map(c=>Object.assign({},c)),
    budget: pr.budget|| (imported&&imported.budget) ||'Budgeted',
    comparability: old.comparability||(imported&&imported.comparability)||'Comparable',
    riskCategory: old.riskCategory||(imported&&imported.riskCategory)||(cx&&cx.riskCategory)||'',
    budgetedValue: old.budgetedValue!=null?old.budgetedValue:((imported&&imported.budgetedValue)||(cx?cx.estValue:0)),
    projectValue: old.projectValue!=null&&old.projectValue!==0?old.projectValue:((imported&&imported.projectValue)||pr.estValue||0),
    exrate: old.exrate||s.exrate,
    suggestion: old.suggestion||PA_SUGGESTIONS[riskLevel(pr.assessment)]||'',
    procurementType: old.procurementType||(imported&&imported.procurementType)||pr.procurementType||'Competitive Quotation',
    marketNote: old.marketNote||'The specifications of the requested items can be found in the market.',
    results: old.results&&old.results.length?old.results:(pr.items||[]).map(it=>({item:it.item,qty:it.qty,location:it.location,spec:it.tech,condition:'',notes:''})),
    emergency: old.emergency||false,
    decision: old.decision||'', decisionNotes: old.decisionNotes||''
  };
  p.pa=pa;
  evaluatePA(p);
}
function evaluatePA(p){
  const s=ws.settings, pa=p.pa, pr=p.pr;
  const ex=num(pa.exrate)||s.exrate;
  const diff=num(pa.projectValue)-num(pa.budgetedValue);
  const diffUsd=diff/ex;
  const valUsd=num(pa.projectValue)/ex;
  const overPct=num(pa.budgetedValue)>0? diff/num(pa.budgetedValue) : null;
  const notes=[]; let ok=true;
  if((pa.budget||'').toLowerCase()==='budgeted'){
    if(diff<=0){ notes.push(`Within budget (difference ${fmtVnd(diff)} VND).`); }
    else {
      const pctOk= overPct!=null && overPct < s.overrunPctLimit/100;
      const amtOk= diffUsd < s.usdLimit;
      if(pctOk||amtOk){ notes.push(`Overrun ${overPct!=null?fmtPct(overPct):'n/a'} / ~$${fmtUsd(diffUsd)} — acceptable (rule: overrun <${s.overrunPctLimit}% OR overrun < $${fmtUsd(s.usdLimit)}).`); }
      else { ok=false; notes.push(`Overrun ${fmtPct(overPct)} (~$${fmtUsd(diffUsd)}) exceeds both limits (<${s.overrunPctLimit}% or <$${fmtUsd(s.usdLimit)}). Requires BOM/BOD approval or re-scope.`); }
    }
  } else {
    // Unbudgeted
    const riskOk=num(pr.assessment)>=s.emergencyRisk;
    const amtOk=valUsd<s.usdLimit;
    if(pa.emergency&&riskOk&&amtOk){ notes.push(`Unbudgeted but qualifies: emergency ✓, risk ${pr.assessment} ≥ ${s.emergencyRisk} ✓, value ~$${fmtUsd(valUsd)} < $${fmtUsd(s.usdLimit)} ✓.`); }
    else { ok=false;
      if(!pa.emergency) notes.push('Unbudgeted and not marked as emergency.');
      if(!riskOk) notes.push(`Risk score ${pr.assessment} below emergency threshold (≥${s.emergencyRisk}).`);
      if(!amtOk) notes.push(`Project value ~$${fmtUsd(valUsd)} exceeds $${fmtUsd(s.usdLimit)} limit for unbudgeted items.`);
    }
  }
  if(!pr.reason) { notes.push('⚠ No rationale/current condition provided in PR — request justification.'); }
  if(!num(pr.assessment)) { notes.push('⚠ Risk assessment missing in PR.'); }
  pa.autoVerdict = ok?'QUALIFIED':'NOT QUALIFIED';
  pa.autoNotes = notes;
  pa.diff=diff; pa.diffUsd=diffUsd; pa.overPct=overPct;
  return ok;
}
function buildMC(p){
  const s=ws.settings; const old=p.mc||{};
  const qc=p.qc||{}; const chosen=qc.chosen||'';
  const chosenVendor=(qc.vendors||[]).find(v=>v.name===chosen)||(qc.vendors||[])[0];
  const rows=(old.rows&&old.rows.length)?old.rows:(p.pr.items||[]).map(it=>({
    item:it.item, qty:it.qty, specA:it.tech, priceA:it.unitPrice, refCode:'', specB:'', priceB:0, specC:'', priceC:0 }));
  p.mc={ code:old.code||deriveDocCode(p,'MC'), date:old.date||todayStr(), vendorA:old.vendorA||chosen, vendorB:old.vendorB||'', vendorC:old.vendorC||'',
    riskTolerance:old.riskTolerance!=null?old.riskTolerance:s.mcTolerance, pvRate:old.pvRate!=null?old.pvRate:s.pvRate,
    years:old.years||0, rows, conclusion:old.conclusion||'', estValue: old.estValue|| (chosenVendor?chosenVendor.amount:0) || (qc.estValue||0) };
}
function mcEval(p){
  const mc=p.mc; if(!mc)return;
  let subA=0,subB=0,subC=0;
  mc.rows.forEach(r=>{
    if(num(r.priceBRaw)) r.priceB=fvPrice(r.priceBRaw, mc.pvRate, mc.years);
    r.amtA=num(r.priceA)*num(r.qty); r.amtB=num(r.priceB)*num(r.qty); r.amtC=num(r.priceC)*num(r.qty);
    subA+=r.amtA; subB+=r.amtB; subC+=r.amtC;
    r.dAB=num(r.priceB)?(num(r.priceA)-num(r.priceB))/num(r.priceB):null;
    r.dAC=num(r.priceC)?(num(r.priceA)-num(r.priceC))/num(r.priceC):null; });
  mc.subA=subA; mc.subB=subB; mc.subC=subC;
  mc.dAB=subB?(subA-subB)/subB:null; mc.dAC=subC?(subA-subC)/subC:null;
  const tol=num(mc.riskTolerance)/100;
  const worst=Math.max(mc.dAB!=null?mc.dAB:-1, mc.dAC!=null?mc.dAC:-1);
  if(mc.dAB==null&&mc.dAC==null){ mc.autoConclusion=MC_CONCLUSIONS[2]; mc.autoStatus='nocheck'; }
  else if(worst<=tol){ mc.autoConclusion=MC_CONCLUSIONS[0]; mc.autoStatus='ok'; }
  else { mc.autoConclusion=MC_CONCLUSIONS[1]; mc.autoStatus='over'; }
}
function fvPrice(pv, ratePct, years){ return num(pv)*Math.pow(1+num(ratePct)/100, num(years)); }

/* ============ ASSET CODE / ALR ============ */
function guessType(p, item){
  const dept=(p.dept||'').toUpperCase(); const nm=(item.item||'').toLowerCase();
  if(/phần mềm|software|hệ điều hành|quyền|license|giấy phép/i.test(nm)) return {group:'C2135',type:'CTP'};
  if(dept==='KIT'||/bếp|lò |nồi |tủ hấp|steamer|oven|fryer|refrigerat|tủ lạnh|tủ mát|freezer|dough|máy rửa/i.test(nm)) return {group:'C2422',type:'LTU'};
  return {group:'C2422',type:'LTU'};
}
function nextSeq(unit, group, type, year){
  // Sequence (5th index) continues from the master register: highest serial for the same
  // [Unit] + [Type] across ALL years and group variants (incl. legacy codes like HKD.C212.OME.0000.00054), then +1.
  const u=String(unit||'').trim().toUpperCase(), t=String(type||'').trim().toUpperCase();
  let max=0;
  const scan=code=>{ if(!code)return; const parts=String(code).trim().toUpperCase().split('.').map(s=>s.trim());
    if(parts.length<4 || parts[0]!==u) return;
    if(!parts.slice(1,-1).includes(t)) return; // type can sit in any middle segment
    const n=parseInt(parts[parts.length-1],10); if(!isNaN(n)&&n>max)max=n; };
  ws.register.forEach(a=>{ scan(a.assetCode); scan(a.assetCode2); });
  ws.projects.forEach(pr=>{ (pr.alr&&pr.alr.rows||[]).forEach(r=>{ scan(r.assetCode); (r.codes||[]).forEach(scan); }); });
  return max+1;
}
function makeCode(unit,group,type,year,seq){ return [unit,group,type,year,String(seq).padStart(5,'0')].join('.'); }
function labelRecommend(row){
  const s=ws.settings;
  const g=ASSET_GROUPS.find(x=>x.code===row.group);
  if(g&&g.intangible) return {label:false, why:'Intangible asset'};
  if(num(row.unitPrice)>0 && num(row.unitPrice)<s.lowValueVnd) return {label:false, why:`Low value < ${fmtVnd(s.lowValueVnd)} VND`};
  if(row.remote) return {label:false, why:'Remote/inaccessible location'};
  return {label:true, why:''};
}
function buildALR(p){
  if(!p.ah||!p.ah.items||!p.ah.items.length){ return; }
  const old=p.alr||{};
  const year=(p.ah.date||todayStr()).slice(0,4);
  const unitDefault=(p.dept||'').toUpperCase()||'SOF';
  const prItems=p.pr&&p.pr.items||[];
  const rows=(old.rows&&old.rows.length)?old.rows:p.ah.items.map((it,i)=>{
    const g=guessType(p,it);
    const prMatch=prItems.find(x=>x.item===it.item)||prItems[i]||{};
    return { item:it.item, qty:it.qty||1, unit:unitDefault, group:g.group, type:g.type, year,
      location:prMatch.location||'', unitPrice:prMatch.unitPrice||0, remote:false, labelOverride:null,
      spec:[it.brand,it.capacity,it.model,it.origin].filter(Boolean).join(', '),
      function:it.function||'',capacity:it.capacity||'',brand:it.brand||'',origin:it.origin||'',model:it.model||'',
      weight:it.weight||'',length:it.length||'',width:it.width||'',heigh_depth:it['heigh_/depth']||it.heigh||'',material:it.material||'',
      serial:it.serial||'',yearMade:it.year||'',manufacturer:it.manufacturer||'',accessory:it.accessory||'',color:it.color||'',
      warranty:it.warranty_period||'', assetCode:'' };
  });
  p.alr={date:old.date||todayStr(), rows};
}
function assignCodes(p){
  if(!p.alr){ toast('No AH data yet — upload the form with the AH sheet filled.',true); return; }
  // group rows by unit/group/type/year and assign sequences; one code per physical unit if qty>1? -> per row expand
  const expanded=[];
  p.alr.rows.forEach(r=>{
    const q=Math.max(1,Math.round(num(r.qty)||1));
    if(!r.assetCode || r.qty!==r._codedQty){
      let seq=nextSeq(r.unit,r.group,r.type,r.year);
      const codes=[];
      for(let i=0;i<q;i++){ codes.push(makeCode(r.unit,r.group,r.type,r.year,seq)); seq++; }
      r.assetCode=codes[0]; r.codes=codes; r._codedQty=r.qty;
    }
  });
  saveWorkspace(); toast('Asset codes assigned ✓'); route();
}

function compileToRegister(pid){

  let added=0;
  assets.forEach(a=>{ if(!existing.has(a.assetCode)){ ws.register.push(a); existing.add(a.assetCode); added++; } });
  saveWorkspace(); toast(`Appended ${added} asset(s) to the register (${assets.length-added} already existed).`); route();

/* =================== ASSET DATA EXPORT FORMATS =================== */
const ASSET_DATA_HEADERS=['Department Code','Handover Date','Project Code','Sub-Project Code','Project Name','Asset Code','Asset Item','Location','Unit Price','Quantity','Function','Capacity','Brand','Origin','Model','Weight','Length','Width','Heigh/Depth','Material','Radius','Fuel','Serial','Shape','Area','Perimeter','Year','Manufacturer','Accessory','Color','Warranty Period','Label'];
function assetToRow(a){
  return [a.dept||'',a.handoverDate||'',a.projectCode||'',a.subProjectCode||'',a.projectName||'',a.assetCode||'',a.name||'',a.location||'',num(a.unitPrice),a.qty||1,a.function||'',a.capacity||'',a.brand||'',a.origin||'',a.model||'',a.weight||'',a.length||'',a.width||'',a.heigh_depth||'',a.material||'','','',a.serial||'','','','',a.yearMade||'',a.manufacturer||'',a.accessory||'',a.color||'',a.warranty||'', a.label?'TRUE':'FALSE'];

function exportBatch(pid){
  const p=ws.projects.find(x=>x.id===pid);

function exportRegister(){

  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([ASSET_DATA_HEADERS].concat(ws.register.map(assetToRow))),'Asset Data');

function importMasterFile(input){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      let added=0;
      const existing=new Set(ws.register.map(a=>a.assetCode));
      wb.SheetNames.forEach(sn=>{
        const grid=sheetGrid(wb,sn); if(!grid||grid.length<2)return;
        const hdr=grid[0].map(v=>v==null?'':String(v).trim());
        const find=names=>{ for(const n of names){ const i=hdr.findIndex(h=>h.toLowerCase()===n.toLowerCase()||h.toLowerCase().startsWith(n.toLowerCase())); if(i>=0)return i; } return -1; };
        const cCode=find(['Mã Tài Sản','Asset Code']); if(cCode<0)return;
        const cName=find(['Tên (*)','Asset Item','Tên']), cCat=find(['Mã Danh Mục','Category']), cLoc=find(['Mã Vị Trí','Location']),
          cPrice=find(['Đơn Giá','Unit Price','Giá Đơn Vị']), cDate=find(['Ngày Mua','Purchase','Handover Date']),
          cDept=find(['Mã Phòng Ban','Department Code']), cDesc=find(['Tên Khác','Mô Tả']), cProj=find(['Mã Dự Án','Project Code']);
        for(let r=1;r<grid.length;r++){ const row=grid[r]; if(!row)continue;
          const code=cellStr(row[cCode]); if(!code||existing.has(code))continue;
          // legacy secondary code sometimes sits in another column (e.g. FBD.T.000.1999.001395) — keep it for sequence continuity
          let code2=''; for(let c=0;c<row.length;c++){ const v=cellStr(row[c]); if(v&&v!==code&&/^[A-Z]{2,4}(\.[\w-]{1,6}){3}\.\d{4,6}$/.test(v)){ code2=v; break; } }
          ws.register.push({ assetCode:code, assetCode2:code2, name:cellStr(cName>=0?row[cName]:''), desc:cellStr(cDesc>=0?row[cDesc]:''), catCode:cellStr(cCat>=0?row[cCat]:''),
            location:cellStr(cLoc>=0?row[cLoc]:''), unitPrice:num(cPrice>=0?row[cPrice]:0), purchaseDate:excelDate(cDate>=0?row[cDate]:''),
            dept:cellStr(cDept>=0?row[cDept]:''), projectCode:cellStr(cProj>=0?row[cProj]:''), imported:true });
          existing.add(code); added++;
        }
      });
      saveWorkspace(); toast(`Imported ${added} assets into the register (sequence counters now continue from these).`); route();
    }catch(err){ toast('Import failed: '+err.message,true); }
  };
  reader.readAsArrayBuffer(file);
  input.value='';
}

async function jsonbinPush(){
  const s=ws.settings;
  if(!s.jsonbinId||!s.jsonbinKey){ toast('Enter Bin ID and API key first.',true); return; }
  try{
    const res=await fetch(`https://api.jsonbin.io/v3/b/${s.jsonbinId}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':s.jsonbinKey,'X-Access-Key':s.jsonbinKey},body:JSON.stringify(ws)});
    if(!res.ok) throw new Error('HTTP '+res.status);
    toast('Pushed to JSONBin ✓');
  }catch(e){ toast('Push failed: '+e.message,true); }
}
async function jsonbinPull(){
  const s=ws.settings;
  if(!s.jsonbinId||!s.jsonbinKey){ toast('Enter Bin ID and API key first.',true); return; }
  if(!confirm('Pull will REPLACE local data with the bin content. Continue?'))return;
  try{
    const res=await fetch(`https://api.jsonbin.io/v3/b/${s.jsonbinId}/latest`,{headers:{'X-Master-Key':s.jsonbinKey,'X-Access-Key':s.jsonbinKey}});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const j=await res.json();
    const incoming=j.record||j;
    const keep={jsonbinId:s.jsonbinId,jsonbinKey:s.jsonbinKey};
    ws=incoming; ws.settings=Object.assign(defaultWorkspace().settings, ws.settings||{}, keep);
    saveWorkspace(); toast('Pulled workspace from JSONBin ✓'); route();
  }catch(e){ toast('Pull failed: '+e.message,true); }
}
async function jsonbinCreate(){
  const s=ws.settings;
  if(!s.jsonbinKey){ toast('Enter your X-Master-Key first.',true); return; }
  try{
    const res=await fetch('https://api.jsonbin.io/v3/b',{method:'POST',headers:{'Content-Type':'application/json','X-Master-Key':s.jsonbinKey,'X-Bin-Name':'FFE-Assessment-Hub'},body:JSON.stringify(ws)});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const j=await res.json();
    s.jsonbinId=j.metadata.id; saveWorkspace(); route();
    toast('Bin created ✓ ID saved: '+s.jsonbinId);
  }catch(e){ toast('Create failed: '+e.message,true); }
}
function exportJSON(){
  const blob=new Blob([JSON.stringify(ws,null,1)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`FFE_Hub_${todayStr()}.json`; a.click();
}
function importJSONFile(input){
  const f=input.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=e=>{ try{ const incoming=JSON.parse(e.target.result);
    if(!incoming.projects){ toast('Not a valid workspace file.',true); return; }
    if(!confirm('Replace local workspace with this file?'))return;
    ws=incoming; ws.settings=Object.assign(defaultWorkspace().settings,ws.settings||{}); saveWorkspace(); route(); toast('Workspace imported ✓');
  }catch(err){ toast('Import failed: '+err.message,true);} };
  rd.readAsText(f); input.value='';
}

function printMCForm(pid){

  const mc=p.mc; mcEval(p);
  const ex=ws.settings.exrate;
  const hasB=mc.rows.some(r=>num(r.priceB)), hasC=mc.rows.some(r=>num(r.priceC));
  const refCodes=[...new Set(mc.rows.map(r=>r.refCode).filter(Boolean))].join(', ');
  const html=`<style>@page{size:A4 landscape}</style><div class="prpage">
  ${letterhead('MARKET CHECK','THẨM ĐỊNH GIÁ',mc.code,mc.date)}
  <div class="band">GENERAL INFORMATION</div>
  <table>
    <tr><td class="lbl-c" style="width:22%">Project No.</td><td class="mono">${esc(p.pr&&p.pr.projectCode||'')}</td><td class="lbl-c" style="width:22%">Project Name</td><td>${esc(p.name||'')}</td></tr>
    <tr><td class="lbl-c">Estimated Project Value</td><td class="num">${fmtVnd(mc.estValue)} VND ~ ${fmtUsd(usdOf(mc.estValue,ex))} USD</td><td class="lbl-c">Risk Tolerance</td><td>${esc(mc.riskTolerance)}% &nbsp;&nbsp; (Time-value rate: ${esc(mc.pvRate)}%/yr, n=${esc(mc.years)}; Exrate: ${fmtVnd(ex)})</td></tr>
  </table>
  <div class="band">DETAILED INFORMATION — UNIT PRICE</div>
  <table>
    <tr><th rowspan="2" style="width:22px">No.</th><th rowspan="2">Asset Item</th><th rowspan="2" style="width:30px">Qnt.</th>
      <th colspan="3">A: Chosen Vendor — ${esc(mc.vendorA||'')}</th>
      <th colspan="3">B: Previous Vendor ${esc(mc.vendorB||'')}${refCodes?' — '+esc(refCodes):''}</th>
      <th colspan="2">C: Market Price / Preference ${esc(mc.vendorC||'')}</th>
      <th colspan="2">Difference</th></tr>
    <tr><th style="width:14%">Spec.</th><th>Unit Price</th><th>Amount</th><th style="width:10%">Spec.</th><th>Unit Price (adj.)</th><th>Amount</th><th>Unit Price</th><th>Amount</th><th>(A−B)/B</th><th>(A−C)/C</th></tr>
    ${mc.rows.map((r,i)=>{ const nz=v=>num(v)?fmtVnd(v):'';
      return `<tr><td>${i+1}</td><td>${esc(r.item)}</td><td style="text-align:center">${r.qty||''}</td>
      <td>${esc(r.specA||'')}</td><td class="num">${nz(r.priceA)}</td><td class="num">${nz(r.amtA)}</td>
      <td>${esc(r.specB||'')}</td><td class="num">${nz(r.priceB)}</td><td class="num">${nz(r.amtB)}</td>
      <td class="num">${nz(r.priceC)}</td><td class="num">${nz(r.amtC)}</td>
      <td class="num">${r.dAB!=null?fmtPct(r.dAB):''}</td><td class="num">${r.dAC!=null?fmtPct(r.dAC):''}</td></tr>`;}).join('')}
    <tr><td colspan="4" style="text-align:right;font-weight:700">Subtotal</td><td></td><td class="num" style="font-weight:700">${fmtVnd(mc.subA)}</td><td></td><td></td><td class="num" style="font-weight:700">${hasB?fmtVnd(mc.subB):''}</td><td></td><td class="num" style="font-weight:700">${hasC?fmtVnd(mc.subC):''}</td><td class="num" style="font-weight:700">${hasB&&mc.dAB!=null?fmtPct(mc.dAB):''}</td><td class="num" style="font-weight:700">${hasC&&mc.dAC!=null?fmtPct(mc.dAC):''}</td></tr>
  </table>
  <div class="band">CONCLUSION</div>
  <table><tr><td>${esc(mc.conclusion||mc.autoConclusion||'')}</td></tr></table>
  ${consentBlock([['Prepared by','Người lập']])}
  </div>`;
  document.getElementById('printArea').innerHTML=html;
  setTimeout(()=>window.print(),80);
}

/* =================== MODAL / DND / INIT =================== */
function showModal(inner){
  const bg=document.createElement('div'); bg.className='modal-bg'; bg.id='modalBg';
  bg.innerHTML=`<div class="modal">${inner}<div style="margin-top:14px;text-align:right"><button class="btn btn-gray" onclick="closeModal()">Close</button></div></div>`;
  bg.addEventListener('click',e=>{ if(e.target===bg)closeModal(); });
  document.body.appendChild(bg);
}
function closeModal(){ const m=document.getElementById('modalBg'); if(m)m.remove(); }
function bindDrops(){
  const dz=document.getElementById('dropZone');
  if(dz){
    const fi=document.getElementById('formFile');
    dz.onclick=()=>fi.click();
    fi.onchange=()=>{ [...fi.files].forEach(handleFormFile); fi.value=''; };
    dz.ondragover=e=>{e.preventDefault();dz.classList.add('hover');};
    dz.ondragleave=()=>dz.classList.remove('hover');
    dz.ondrop=e=>{e.preventDefault();dz.classList.remove('hover');[...e.dataTransfer.files].forEach(handleFormFile);};
  }
}
window.addEventListener('DOMContentLoaded',()=>{
  loadWorkspace();
  if(typeof XLSX==='undefined') toast('⚠ Excel library could not load — check internet connection. Upload/exports need it once per session.',true);
  route();
});
