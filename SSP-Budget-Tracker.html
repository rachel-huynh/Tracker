<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SSP Budget Tracker — Sofitel Saigon Plaza Renovation</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
:root{
  --navy:#16283e; --navy2:#1f3a5f; --gold:#c8a557; --gold2:#e6cf9a;
  --bg:#f4f5f7; --card:#ffffff; --line:#e3e6ea; --txt:#20242b; --mut:#6b7280;
  --green:#1e7f4f; --greenbg:#e5f5ec; --red:#b03030; --redbg:#fbe9e9;
  --amber:#9a6b00; --amberbg:#fdf3d7; --blue:#2b5f8f; --bluebg:#e8f1f8;
  --rad:10px; --shadow:0 1px 3px rgba(22,40,62,.08),0 4px 14px rgba(22,40,62,.06);
}
*{box-sizing:border-box} html,body{margin:0;padding:0}
body{font-family:"Segoe UI",system-ui,-apple-system,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
h1,h2,h3{margin:0}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:13px;padding:6px 8px;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--txt)}
input:focus,select:focus,textarea:focus{outline:2px solid rgba(200,165,87,.45);border-color:var(--gold)}
input[type=number]{text-align:right}
/* header */
header{background:linear-gradient(100deg,var(--navy) 0%,var(--navy2) 70%,#2a4a73 100%);color:#fff;padding:14px 22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brand{display:flex;flex-direction:column;gap:2px;margin-right:auto}
.brand .t1{font-size:19px;font-weight:600;letter-spacing:.06em}
.brand .t1 b{color:var(--gold2);font-weight:700}
.brand .t2{font-size:11.5px;opacity:.75;letter-spacing:.14em;text-transform:uppercase}
.hpill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:20px;padding:5px 14px;font-size:12px;max-width:340px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.seg{display:flex;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:8px;overflow:hidden}
.seg button{background:transparent;border:0;color:#fff;padding:6px 13px;font-size:12.5px;opacity:.75}
.seg button.on{background:var(--gold);color:var(--navy);opacity:1;font-weight:600}
/* nav */
nav{display:flex;gap:2px;background:#fff;border-bottom:1px solid var(--line);padding:0 14px;overflow-x:auto;position:sticky;top:0;z-index:40}
nav button{background:none;border:0;border-bottom:3px solid transparent;padding:12px 15px;font-size:13.5px;color:var(--mut);white-space:nowrap;font-weight:500}
nav button.on{color:var(--navy2);border-bottom-color:var(--gold);font-weight:600}
nav button:hover{color:var(--navy2)}
main{padding:18px 22px 60px;max-width:1500px;margin:0 auto}
.tab{display:none} .tab.on{display:block}
/* cards & layout */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;margin-bottom:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--rad);box-shadow:var(--shadow);padding:14px 16px}
.card .lbl{font-size:11.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.card .val{font-size:21px;font-weight:700;color:var(--navy2);line-height:1.2}
.card .sub{font-size:12px;color:var(--mut);margin-top:4px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--rad);box-shadow:var(--shadow);padding:16px 18px;margin-bottom:16px}
.panel h3{font-size:14.5px;color:var(--navy2);margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.areagrid{display:grid;grid-template-columns:3fr 2fr;gap:16px;align-items:start}
@media(max-width:980px){.grid2,.areagrid{grid-template-columns:1fr}}
.chartbox{position:relative;height:300px}
/* tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f1f3f6;color:#3d4a5c;text-align:left;padding:8px 9px;font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;position:sticky;top:0}
td{padding:7px 9px;border-bottom:1px solid #eef0f3;vertical-align:top}
tr:hover td{background:#fafbfd}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
tr.sect td{background:#eef2f7;font-weight:600;color:var(--navy2)}
tr.grp td{background:#f7f2e4;font-weight:600;color:#6b5518}
tr.total td{background:#16283e0d;font-weight:700;border-top:2px solid var(--navy2)}
.tblwrap{overflow:auto;max-height:64vh;border:1px solid var(--line);border-radius:8px}
/* chips & badges */
.chip{display:inline-block;padding:2px 9px;border-radius:12px;font-size:11.5px;font-weight:600}
.chip.g{background:var(--greenbg);color:var(--green)} .chip.r{background:var(--redbg);color:var(--red)}
.chip.a{background:var(--amberbg);color:var(--amber)} .chip.b{background:var(--bluebg);color:var(--blue)}
.chip.n{background:#eceef1;color:#4b5563}
.pos{color:var(--red);font-weight:600} .neg{color:var(--green);font-weight:600} .zero{color:var(--mut)}
.refcode{color:var(--blue);cursor:pointer;text-decoration:underline dotted;font-weight:600}
/* buttons */
.btn{background:var(--navy2);color:#fff;border:0;border-radius:7px;padding:8px 16px;font-size:13px;font-weight:500}
.btn:hover{background:var(--navy)}
.btn.gold{background:var(--gold);color:var(--navy);font-weight:600}
.btn.ghost{background:#fff;color:var(--navy2);border:1px solid var(--line)}
.btn.ghost:hover{background:#f4f6f9}
.btn.danger{background:#fff;color:var(--red);border:1px solid #ecc}
.btn.danger:hover{background:var(--redbg)}
.btn.sm{padding:4px 10px;font-size:12px;border-radius:6px}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.toolbar .sp{margin-left:auto}
/* dropzone */
.drop{border:2px dashed #c4ccd6;border-radius:var(--rad);padding:34px;text-align:center;color:var(--mut);background:#fff;transition:.15s}
.drop.over{border-color:var(--gold);background:#fdf9ef}
/* hero */
.hero{background:linear-gradient(120deg,var(--navy),#2a4a73);border-radius:14px;color:#fff;padding:34px 36px;margin-bottom:18px}
.hero h2{font-size:22px;margin-bottom:8px}
.hero p{opacity:.85;max-width:760px;line-height:1.55;margin:0 0 16px}
/* modal */
.modalbg{position:fixed;inset:0;background:rgba(20,30,45,.55);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:5vh 16px;overflow:auto}
.modalbg.on{display:flex}
.modal{background:#fff;border-radius:12px;max-width:680px;width:100%;padding:22px 24px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h3{font-size:16px;color:var(--navy2);margin-bottom:14px}
/* toast */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 22px;border-radius:8px;font-size:13px;opacity:0;pointer-events:none;transition:.25s;z-index:200;box-shadow:var(--shadow)}
#toast.on{opacity:1}
/* VE option cards */
.opts{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
.opt{background:#fff;border:1px solid var(--line);border-left:4px solid var(--gold);border-radius:10px;padding:14px;box-shadow:var(--shadow)}
.opt .row{display:flex;gap:8px;margin-bottom:8px;align-items:center;flex-wrap:wrap}
.opt label{font-size:11px;color:var(--mut);display:block;margin-bottom:2px}
.opt .fld{flex:1;min-width:90px}
.opt input,.opt textarea{width:100%}
.opt .res{background:#f6f7f9;border-radius:8px;padding:10px;display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12.5px;margin-top:6px}
.opt .res b{font-variant-numeric:tabular-nums}
.thumbs{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.thumbs img{width:64px;height:64px;object-fit:cover;border-radius:6px;border:1px solid var(--line);cursor:pointer}
.thumbs .fdoc{width:64px;height:64px;border-radius:6px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:10px;text-align:center;padding:3px;background:#f6f7f9;cursor:pointer;word-break:break-all;overflow:hidden}
/* attachments grid */
.atts{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.att{background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;box-shadow:var(--shadow)}
.att .prev{height:130px;background:#f0f2f5;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:30px;color:#9aa4b1}
.att .prev img{width:100%;height:100%;object-fit:cover;cursor:pointer}
.att .meta{padding:9px 11px;font-size:12px}
.att .nm{font-weight:600;color:var(--navy2);word-break:break-all}
.att .row2{display:flex;gap:6px;margin-top:7px;align-items:center}
/* misc */
.help{font-size:12.5px;color:var(--mut);line-height:1.55}
.kv{display:grid;grid-template-columns:auto 1fr;gap:5px 14px;font-size:13px}
.kv b{font-variant-numeric:tabular-nums}
.warnbox{background:var(--amberbg);border:1px solid #ecd9a0;color:#6b4f00;border-radius:8px;padding:10px 13px;font-size:12.5px;margin:10px 0}
.okbox{background:var(--greenbg);border:1px solid #bfe3cf;color:#155c3b;border-radius:8px;padding:10px 13px;font-size:12.5px;margin:10px 0}
.setrow{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f0f1f4;flex-wrap:wrap}
.setrow .sl{width:280px;font-weight:500}
.setrow .sd{font-size:12px;color:var(--mut);flex-basis:100%;margin-top:-4px}
.bar{height:9px;background:#e7eaee;border-radius:6px;overflow:hidden;margin-top:8px}
.bar i{display:block;height:100%;border-radius:6px}
.sticky-tot{position:sticky;bottom:0;background:var(--navy);color:#fff;border-radius:10px;padding:12px 18px;display:flex;gap:26px;flex-wrap:wrap;margin-top:12px;box-shadow:0 -4px 18px rgba(0,0,0,.15);z-index:30}
.sticky-tot .it{font-size:12px;opacity:.8}
.sticky-tot .iv{font-size:15.5px;font-weight:700;font-variant-numeric:tabular-nums}
@media print{ header .seg, nav, .toolbar, .btn, .noprint{display:none!important} body{background:#fff} .panel,.card{box-shadow:none} main{padding:0} .tab{display:none}.tab.on{display:block} }
/* dedicated PDF report */
#printReport{display:none;padding:24px;font-size:12px;background:#fff;color:#20242b}
#printReport h1{font-size:20px;color:#16283e;border-bottom:3px solid #c8a557;padding-bottom:8px;margin:0 0 4px}
#printReport h2{font-size:14px;color:#1f3a5f;margin:16px 0 6px}
#printReport table{margin-bottom:10px;font-size:11.5px}
#printReport th{position:static}
@media print{ body.rpt>header,body.rpt>nav,body.rpt>main{display:none!important} body.rpt #printReport{display:block!important} }
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="t1">SSP <b>BUDGET TRACKER</b></div>
    <div class="t2" id="hSub">Sofitel Saigon Plaza Renovation — PIP Cost Control</div>
  </div>
  <div class="hpill" id="hVer">—</div>
  <div class="seg" id="curSeg">
    <button data-cur="VND">VND</button><button data-cur="USD">USD</button>
  </div>
  <div class="seg" id="langSeg">
    <button data-lang="en">EN</button><button data-lang="vi">VI</button>
  </div>
</header>
<nav id="nav"></nav>
<main>
  <section class="tab" id="tab-dash"></section>
  <section class="tab" id="tab-versions"></section>
  <section class="tab" id="tab-compare"></section>
  <section class="tab" id="tab-rates"></section>
  <section class="tab" id="tab-estimate"></section>
  <section class="tab" id="tab-ve"></section>
  <section class="tab" id="tab-materials"></section>
  <section class="tab" id="tab-pay"></section>
  <section class="tab" id="tab-atts"></section>
  <section class="tab" id="tab-settings"></section>
</main>
<input type="file" id="fileXlsx" accept=".xlsx,.xlsm,.xls" style="display:none">
<input type="file" id="fileAtt" multiple style="display:none">
<input type="file" id="fileOptImg" multiple accept="image/*,.pdf,.doc,.docx,.xls,.xlsx" style="display:none">
<input type="file" id="fileImport" accept=".json" style="display:none">
<input type="file" id="fileLink" multiple style="display:none">
<input type="file" id="fileLedger" accept=".xlsx,.xls" style="display:none">
<input type="file" id="fileContracts" accept=".xlsx,.xls" style="display:none">
<input type="file" id="fileQuote" accept=".xlsx,.xls" multiple style="display:none">
<div class="modalbg" id="modalbg"><div class="modal" id="modal"></div></div>
<div id="printReport"></div>
<div id="toast"></div>

/* ============================== utils ============================== */
const $ = s=>document.querySelector(s);
const uid = ()=> (crypto.randomUUID ? crypto.randomUUID() : 'id'+Date.now()+Math.random().toString(16).slice(2));
function n(v){ if(typeof v==='number'&&isFinite(v)) return v; if(v==null) return null; const p=parseFloat(String(v).replace(/,/g,'')); return isFinite(p)?p:null; }
function s(v){ return v==null?'':String(v).trim(); }
function esc(x){ return s(x).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function norm(x){ return s(x).toLowerCase().replace(/\s+/g,' '); }
function money(v,cur){ cur=cur||state.currency; if(v==null||!isFinite(v)) return '—';
  if(cur==='USD'){ const u=v/ (state.fx||26450); return '$'+Math.round(u).toLocaleString('en-US'); }
  return Math.round(v).toLocaleString('en-US'); }
function moneyU(u){ if(u==null||!isFinite(u)) return '—'; return '$'+Math.round(u).toLocaleString('en-US'); }
function compact(v){ if(v==null) return '—'; const a=Math.abs(v);
  if(state.currency==='USD'){ const u=v/(state.fx||26450); const au=Math.abs(u); if(au>=1e6) return '$'+(u/1e6).toFixed(2)+'M'; if(au>=1e3) return '$'+(u/1e3).toFixed(0)+'K'; return '$'+u.toFixed(0); }
  if(a>=1e9) return (v/1e9).toFixed(1)+' bn'; if(a>=1e6) return (v/1e6).toFixed(0)+' m'; return Math.round(v).toLocaleString(); }
function pct(v){ return (v==null||!isFinite(v))?'—':(v*100).toFixed(1)+'%'; }
function cls(d){ return d>0.5?'pos':(d<-0.5?'neg':'zero'); }
function sign(v){ return v>0?'+':''; }
function fsize(b){ return b>1048576?(b/1048576).toFixed(1)+' MB':(b/1024).toFixed(0)+' KB'; }
function toast(m){ const el=$('#toast'); el.textContent=m; el.classList.add('on'); clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('on'),2200); }

/* ============================== parser ============================== */
function sheetRows(ws){ return XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:null}); }
function findHeaderRow(rows,words,maxR){ maxR=maxR||20;
  for(let r=0;r<Math.min(rows.length,maxR);r++){ const row=rows[r]||[]; let hit=0;
    for(const w of words){ if(row.some(c=>norm(c)===norm(w)||norm(c).startsWith(norm(w)))) hit++; }
    if(hit>=words.length) return r; } return -1; }
function colOf(row,pred){ for(let c=0;c<row.length;c++){ if(pred(row[c],c)) return c; } return -1; }

function parseSummary(rows){
  const out={sections:[],addOns:[],roomBlocks:[],perKey:[],gfa:null,nett:null,grandTotal:null,grandUSD:null,prevBudget:null,fx:null,warnings:[]};
  let hr=-1;
  for(let r=0;r<25;r++){ const row=rows[r]||[]; if(row.some(c=>norm(c)==='item')&&row.some(c=>norm(c)==='description')){hr=r;break;} }
  if(hr<0){ out.warnings.push('Summary header not found'); return null; }
  const H=rows[hr];
  // fx
  for(let r=0;r<8;r++){ const row=rows[r]||[]; for(let c=0;c<row.length;c++){ if(/usd\s*\/\s*vnd/i.test(s(row[c]))){ for(let c2=c+1;c2<row.length;c2++){ const f=n(row[c2]); if(f&&f>1000){out.fx=f;break;} } } } }
  const colDesc=colOf(H,c=>norm(c)==='description');
  let colTotal=-1,colUSD=-1;
  for(let c=colDesc+1;c<H.length;c++){ const h=norm(H[c]); if(colTotal<0&&h.startsWith('total (vnd')) colTotal=c; if(colUSD<0&&h.startsWith('total (usd')) colUSD=c; }
  if(colTotal<0){ out.warnings.push('TOTAL (VND) column not found'); return null; }
  // room blocks: header row has '%', codes row above has label
  const codesRow=rows[hr-1]||[];
  const blocks=[];
  for(let c=colUSD>0?colUSD+1:colTotal+1;c<H.length;c++){
    if(norm(H[c])==='%'&&s(codesRow[c])){ blocks.push({code:s(codesRow[c]),cPct:c,cM2:c+1,cTot:c+2}); } }
  // previous budget block (label in row hr-2)
  const r6=rows[hr-2]||[];
  for(let c=0;c<r6.length;c++){ if(/previous budget/i.test(s(r6[c]))){ for(let c2=c;c2<c+4;c2++){ if(norm(H[c2]||'').startsWith('total')){ out.prevBudget={label:s(r6[c]),col:c2,grandTotal:null}; break; } } } }
  // gfa row
  let gfaRow=-1;
  for(let r=hr+1;r<hr+8;r++){ const row=rows[r]||[]; if(row.some(c=>/gfa/i.test(s(c)))){ gfaRow=r; break; } }
  if(gfaRow>0){ out.gfa=n(rows[gfaRow][colTotal]); for(const b of blocks){ b.gfa=n(rows[gfaRow][b.cTot]); } }
  out.roomBlocks=blocks.map(b=>({code:b.code,gfa:b.gfa||null,total:null,nett:null}));
  // walk rows
  let cur=null, afterNett=false, grandRow=-1;
  for(let r=(gfaRow>0?gfaRow+1:hr+1);r<rows.length;r++){
    const row=rows[r]||[];
    if(grandRow>0 && r>grandRow){ // per-key summary rows: label sits in cost/m2 column
      const lbl=s(row[colTotal-1]); const g=n(row[colTotal]);
      if(lbl&&g!=null&&!/^\d/.test(lbl)){ out.perKey.push({name:lbl,totalVND:g,perKeyUSD:colUSD>0?n(row[colUSD]):null}); }
      continue;
    }
    const d=s(row[colDesc]); if(!d) continue;
    const tot=n(row[colTotal]);
    if(/^section no/i.test(d)){ cur={name:d.replace(/^Section No\.?\s*\d+\s*-\s*/i,''),items:[],subtotal:null}; out.sections.push(cur); continue; }
    if(/^sub-?total/i.test(d)){ if(cur){cur.subtotal=tot;} cur=null; continue; }
    if(/^nett construction/i.test(d)){ out.nett=tot; afterNett=true; cur=null;
      blocks.forEach((b,i)=>{ out.roomBlocks[i].nett=n(row[b.cTot]); }); continue; }
    if(/^total project construction/i.test(d)){ out.grandTotal=tot; grandRow=r;
      if(colUSD>0) out.grandUSD=n(row[colUSD]);
      if(out.prevBudget) out.prevBudget.grandTotal=n(row[out.prevBudget.col]);
      blocks.forEach((b,i)=>{ out.roomBlocks[i].total=n(row[b.cTot]); }); continue; }
    if(afterNett && out.grandTotal==null){ // add-ons between nett and grand
      let m=d.match(/at\s+([\d.]+)\s*%/i); out.addOns.push({name:d,total:tot,pct:m?parseFloat(m[1]):null}); continue; }
    if(cur && tot!=null){ const it={desc:d,total:tot,costM2:n(row[colTotal-1]),pct:n(row[colTotal-2]),perRoom:{}};
      if(out.prevBudget){ it.prev=n(row[out.prevBudget.col]); }
      for(const b of blocks){ const bt=n(row[b.cTot]); if(bt!=null) it.perRoom[b.code]={t:bt,m2:n(row[b.cM2])}; }
      cur.items.push(it); continue; }
  }
  return out;
}

function parseDetail(name,rows){
  let hr=-1;
  for(let r=0;r<15;r++){ const row=rows[r]||[]; if(norm(row[0])==='item'&&row.some(c=>norm(c)==='description')) {hr=r;break;} }
  if(hr<0) return null;
  const H=rows[hr], S=rows[hr+1]||[];
  const colDesc=colOf(H,c=>norm(c)==='description');
  let colQty=colOf(H,c=>norm(c).startsWith('total quantity')); if(colQty<0) colQty=colOf(H,c=>norm(c)==='quantity');
  const colUnit=colOf(H,c=>norm(c)==='unit');
  const colSup=colOf(S,c=>norm(c)==='supply');
  const colIns=colOf(S,c=>norm(c)==='install');
  const colRate=colOf(S,c=>norm(c)==='total rate');
  let colAmt=colOf(H,c=>norm(c).startsWith('total amount'));
  if(colAmt<0) colAmt=colOf(H,c=>norm(c).startsWith('amount'));
  if(colAmt<0) return null;
  const items=[]; let group='',category='';
  for(let r=hr+2;r<rows.length;r++){
    const row=rows[r]||[]; const a=row[0];
    const dD=s(row[3])||s(row[4]); const dB=s(row[1]), dC=s(row[2]);
    const amt=n(row[colAmt]);
    const isNo = (typeof a==='number') || (/^\d+(\.\d+)?$/.test(s(a)));
    if(!isNo){
      if(dB&&!dD){ group=dB; category=dB; continue; }
      if(dC&&!dD){ category=dC; continue; }
      continue;
    }
    const desc=dD||dC||dB; if(!desc) continue;
    if(/^(the contractor|notwithstanding)/i.test(desc)) continue;
    const qty=colQty>=0?n(row[colQty]):null;
    const rate=colRate>=0?n(row[colRate]):null;
    const sup=colSup>=0?n(row[colSup]):null, ins=colIns>=0?n(row[colIns]):null;
    const inclFlag = amt==null && /incl/i.test(s(row[colAmt])||s(row[colRate>=0?colRate:0]));
    let total=amt; if(total==null&&qty!=null&&rate!=null) total=qty*rate;
    if(total==null&&!inclFlag&&rate==null) continue;
    items.push({ id:name.replace(/[^A-Za-z0-9]/g,'')+'-r'+r, sheet:name, group, category,
      no:s(a), desc, qty, unit:s(row[colUnit]), supply:sup, install:ins, rate, total:total||0, incl:inclFlag||undefined });
  }
  return items.length?items:null;
}

function parseMaterials(rows){
  let hr=-1;
  for(let r=0;r<8;r++){ const row=rows[r]||[]; if(row.some(c=>/ref\s*code/i.test(s(c)))){hr=r;break;} }
  if(hr<0) return [];
  const H=rows[hr];
  const cRef=colOf(H,c=>/ref\s*code/i.test(s(c))), cItem=colOf(H,c=>norm(c)==='item'), cArea=colOf(H,c=>norm(c)==='area'),
        cDesc=colOf(H,c=>norm(c)==='description'), cSup=colOf(H,c=>norm(c)==='supplier'), cVe=colOf(H,c=>norm(c)==='ve'), cRem=colOf(H,c=>norm(c).startsWith('remark'));
  const mats=[]; let cat='';
  for(let r=hr+1;r<rows.length;r++){ const row=rows[r]||[];
    const ref=s(row[cRef]);
    if(!ref){ const a=s(row[0]); if(a&&!n(a)) cat=a; continue; }
    mats.push({ref,category:cat,item:s(row[cItem]),area:s(row[cArea]),desc:s(row[cDesc]),supplier:s(row[cSup]),ve:cVe>=0?s(row[cVe]):'',remarks:cRem>=0?s(row[cRem]):''});
  }
  return mats;
}

function parseRooms(rows){
  let hr=-1;
  for(let r=0;r<15;r++){ const row=rows[r]||[]; if(row.some(c=>/room type/i.test(s(c)))){hr=r;break;} }
  if(hr<0) return [];
  const out=[];
  for(let r=hr+1;r<rows.length;r++){ const row=rows[r]||[];
    const name=s(row[1]); if(!name) continue;
    if(/out of sow/i.test(s(row[5]))) continue;
    const code=s(row[2]); const keys=n(row[3]); const gfa=n(row[4]);
    if(keys==null&&gfa==null) continue;
    out.push({name,code,keys,gfa,totalGfa:n(row[5])});
  }
  return out;
}

function parseWorkbook(wb,fileName){
  const hidden={}; ((wb.Workbook||{}).Sheets||[]).forEach(sh=>{ if(sh.Hidden) hidden[sh.name]=true; });
  const names=wb.SheetNames.filter(nm=>!hidden[nm]);
  const warnings=[];
  // summary
  let summary=null;
  const sumNames=names.filter(nm=>/summary/i.test(nm)&&!/per key/i.test(nm)).concat(names.filter(nm=>/per key/i.test(nm)));
  for(const nm of sumNames){ try{ const r=parseSummary(sheetRows(wb.Sheets[nm])); if(r&&r.grandTotal){ summary=r; summary.sheetName=nm; break; } }catch(e){ warnings.push(nm+': '+e.message); } }
  if(!summary) warnings.push('No summary sheet parsed — dashboard totals limited.');
  // details
  let items=[]; const parsedSheets=[];
  for(const nm of names){ if(/summary|per key|cover|room schedule|material|explaination|explanation|drawing|cmt|notes|sheet\d/i.test(nm)) continue;
    try{ const its=parseDetail(nm,sheetRows(wb.Sheets[nm])); if(its){ items=items.concat(its); parsedSheets.push(nm); } }catch(e){ warnings.push(nm+': '+e.message); } }
  if(!items.length) warnings.push('No detail BOQ sheets parsed — item-level features limited.');
  // materials + rooms
  let materials=[],rooms=[];
  for(const nm of names){ if(/material/i.test(nm)){ try{ materials=parseMaterials(sheetRows(wb.Sheets[nm])); }catch(e){} } }
  for(const nm of names){ if(/room schedule/i.test(nm)){ try{ rooms=parseRooms(sheetRows(wb.Sheets[nm])); }catch(e){} } }
  // version date guess from filename e.g. 260701 (yymmdd)
  let date=new Date().toISOString().slice(0,10);
  const m=(fileName||'').match(/(\d{2})(\d{2})(\d{2})/g);
  if(m){ const last=m[m.length-1]; const y=+last.slice(0,2),mo=+last.slice(2,4),da=+last.slice(4,6);
    if(mo>=1&&mo<=12&&da>=1&&da<=31) date=`20${last.slice(0,2)}-${last.slice(2,4)}-${last.slice(4,6)}`; }
  return { id:uid(), name:(fileName||'Version').replace(/\.(xlsx|xlsm|xls)$/i,''), fileName:fileName||'', date, note:'',
    fx:(summary&&summary.fx)||state.fx, summary, items, materials, rooms, ov:{}, newItems:[], warnings, parsedSheets, createdAt:Date.now() };
}

/* ============================== computed ============================== */
function itemEff(v,it){ const o=(v.ov||{})[it.id]||{};
  const inc=o.inc!==undefined?o.inc:true;
  const qty=o.qty!==undefined?o.qty:it.qty;
  const rate=o.rate!==undefined?o.rate:it.rate;
  let total; if((o.qty!==undefined||o.rate!==undefined)&&qty!=null&&rate!=null) total=qty*rate; else total=it.total;
  return {inc,qty,rate,total:inc?total:0,changed:o.qty!==undefined||o.rate!==undefined||o.inc===false};
}
function estDelta(v){ if(!v) return 0; let d=0;
  for(const it of (v.items||[])){ const e=itemEff(v,it); d+= e.total - it.total; }
  for(const ni of (v.newItems||[])){ if(ni.inc!==false) d += (n(ni.qty)||0)*(n(ni.rate)||0); }
  return d; }
function veDelta(){ let d=0; for(const o of state.options){ if(o.include){ const q=n(o.qty)||0; d+=((n(o.newRate)||0)-(n(o.baseRate)||0))*q; } } return d; }
function grandOf(v){ return v&&v.summary?v.summary.grandTotal:null; }
function adjustedGrand(v){ const g=grandOf(v); if(g==null) return null; return g + estDelta(v)*(1+state.prelimsPct/100); }
function forecastGrand(v){ const a=adjustedGrand(v); if(a==null) return null; return a + veDelta()*(1+state.prelimsPct/100); }
/* main-area classification: guest = main package (rooms/suites/corridor incl. prelims),
   public = Lobby + Club Lounge add-ons, proj = professional fees, fnb = manual only */
const AREAS=[
  {id:'guest', k:'areaGuest', sub:'areaGuestSub', color:'#1f3a5f'},
  {id:'public',k:'areaPublic',sub:'areaPublicSub',color:'#c8a557'},
  {id:'fnb',  k:'areaFnb',  sub:'areaFnbSub',  color:'#3e7c8f'},
  {id:'proj', k:'areaProj', sub:'areaProjSub', color:'#9aa4b1'}];
function areaBreakdown(v){
  const res={guest:{file:0,manual:0},public:{file:0,manual:0},fnb:{file:0,manual:0},proj:{file:0,manual:0}};
  if(v&&v.summary){ const su=v.summary; res.guest.file+=su.nett||0;
    for(const a of su.addOns){ const nm=norm(a.name);
      if(/lobby|club/.test(nm)) res.public.file+=a.total||0;
      else if(/fee/.test(nm)) res.proj.file+=a.total||0;
      else res.guest.file+=a.total||0; } }
  for(const m of (state.manualAreas||[])){ if(res[m.area]) res[m.area].manual+=n(m.amount)||0; }
  return res;
}
function roomKeys(v,code){ if(!v||!v.rooms) return null;
  const base=code.split(/[\s(]/)[0];
  const blk=(v.summary&&v.summary.roomBlocks||[]).find(b=>b.code===code);
  const room=v.rooms.find(r=>r.code===base)||v.rooms.find(r=>r.code&&code.startsWith(r.code));
  if(room&&room.gfa&&blk&&blk.gfa) return Math.round(blk.gfa/room.gfa);
  return null; }

/* ============================== rate studio (contractor quotations) ============================== */
function parseQuote(wb,fileName){
  const items=[]; const sheets=[];
  for(const nm of wb.SheetNames){
    if(/cover|summary|material|prelim/i.test(nm)) continue;
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[nm],{header:1,raw:true,defval:null});
    let hr=-1;
    for(let i=0;i<15;i++){ const r=rows[i]||[]; if(norm(r[0])==='item'&&r.some(c=>norm(c)==='quantity')){ hr=i; break; } }
    if(hr<0) continue;
    const H=rows[hr], S=rows[hr+1]||[];
    const cQty=colOf(H,c=>norm(c)==='quantity'), cUnit=colOf(H,c=>norm(c)==='unit');
    const cSup=colOf(S,c=>norm(c)==='supply'), cIns=colOf(S,c=>norm(c)==='install'), cRate=colOf(S,c=>norm(c)==='total rate');
    const cAmt=colOf(H,c=>norm(c).startsWith('amount'));
    let cat='',sub='';
    for(let i=hr+2;i<rows.length;i++){ const r=rows[i]||[];
      const no=s(r[0]); const d1=s(r[1]), d3=s(r[3])||s(r[2]);
      const qty=n(r[cQty]);
      if(!no&&d1&&!d3&&qty==null){ cat=d1; sub=''; continue; }
      if(!no&&d3&&qty==null&&n(r[cRate])==null&&(cAmt<0||n(r[cAmt])==null)){
        if(d3.length<80&&!/^we hereby|^notwithstanding|^the contractor|^allow /i.test(d3)) sub=d3;
        continue; }
      if(!/^[A-Z]{1,2}$|^\d+(\.\d+)?$/.test(no)) continue;
      const desc=d3||d1; if(!desc) continue;
      const sup=n(r[cSup]), ins=n(r[cIns]); let rate=n(r[cRate]);
      if(rate==null&&(sup!=null||ins!=null)) rate=(sup||0)+(ins||0);
      const amt=cAmt>=0?n(r[cAmt]):null;
      const remark=(cAmt>=0&&amt==null&&s(r[cAmt]))?s(r[cAmt]):s(r[cAmt+1]);
      items.push({sheet:nm,cat,sub,no,desc,qty,unit:s(r[cUnit]),supply:sup,install:ins,rate,amount:amt,remark});
    }
    sheets.push(nm);
  }
  if(!items.length) return null;
  return {id:uid(),name:(fileName||'Quote').replace(/\.(xlsx|xls)$/i,''),file:fileName||'',importedAt:new Date().toISOString(),sheets,items};
}
/* QS matching: category+desc+unit → desc+unit → desc; distinct QS rates ⇒ ambiguous (user resolves) */
function qsRateIndex(v){
  const map={};
  for(const it of ((v||{}).items)||[]){ if(it.rate==null||!(it.rate>0)) continue;
    const d=norm(it.desc), u=norm(it.unit);
    for(const k of [norm(it.category)+'||'+d+'||'+u, '*||'+d+'||'+u, '*||'+d+'||*']) (map[k]=map[k]||[]).push(it); }
  return map;
}
function findQs(map,cat,desc,unit){
  for(const k of [norm(cat)+'||'+norm(desc)+'||'+norm(unit), '*||'+norm(desc)+'||'+norm(unit), '*||'+norm(desc)+'||*']){
    const list=map[k];
    if(list&&list.length){ const rates=[...new Set(list.map(x=>Math.round(x.rate)))];
      return {item:list[0],candidates:list,ambiguous:rates.length>1}; } }
  return null;
}
function rateRows(){ // grid rows grouped across quotations; QS from active version
  const v=activeVer(); const map=qsRateIndex(v);
  const qsById={}; for(const it of ((v||{}).items)||[]) qsById[it.id]=it;
  const groups=new Map();
  state.quotes.forEach(qt=>{ qt.items.forEach((it,idx)=>{
    if(it.rate==null||!(it.rate>0)) return;
    const g=norm(it.cat)+'||'+norm(it.desc)+'||'+norm(it.unit);
    if(!groups.has(g)) groups.set(g,{key:g,cat:it.cat,sub:it.sub,desc:it.desc,unit:it.unit,per:{},qs:undefined});
    const row=groups.get(g);
    if(!(qt.id in row.per)) row.per[qt.id]={rate:it.rate,qty:it.qty,remark:it.remark,idx};
    if(row.qs===undefined){
      const ov=(state.rateLinks||{})[g];
      if(ov==='none') row.qs=null;
      else if(ov&&qsById[ov]) row.qs={item:qsById[ov],candidates:[qsById[ov]],ambiguous:false,manual:true};
      else row.qs=findQs(map,it.cat,it.desc,it.unit);

  }); });

function rateStats(rows){
  const per={}; let saving=0, exposure=0, matched=0;
  for(const qt of state.quotes) per[qt.id]={num:0,den:0,n:0};
  for(const r of rows){ if(!r.qs||r.qs.ambiguous) continue;
    const qsRate=r.qs.item.rate, qsQty=r.qs.item.qty;
    if(!(qsRate>0)) continue;
    matched++;
    const quoted=Object.values(r.per).map(x=>x.rate).filter(x=>x>0);
    if(quoted.length&&qsQty>0){ const best=Math.min(...quoted);
      if(best<qsRate) saving+=(qsRate-best)*qsQty; else exposure+=(best-qsRate)*qsQty; }
    for(const qt of state.quotes){ const p=r.per[qt.id];
      if(p&&p.rate>0&&qsQty>0){ per[qt.id].num+=p.rate*qsQty; per[qt.id].den+=qsRate*qsQty; per[qt.id].n++; } } }
  return {per,saving,exposure,matched};
}

const ACC_NAMES={'1111':'Cash','11212':'Bank','1331':'VAT deductible','2412':'CIP — Construction','2413':'CIP — Major repair','2414':'CIP — Upgrade/renovation','3311':'Payables (suppliers)','33518':'Other accruals','33888':'Other payable','3341':'Employee payable','3386':'Unemployment ins.','3383':'Social ins.','3384':'Health ins.','64217':'Travel expenses','64276':'Entertainment','64282':'Non-capitalized PIP costs','64288':'Other cash costs','64273':'Post & telecom','64278':'Other services','6421':'Employee cost'};
function accName(code){ return ACC_NAMES[code]?code+' · '+ACC_NAMES[code]:code; }
function xlDate(v){ if(typeof v!=='number') return ''; return new Date(Date.UTC(1899,11,30)+v*86400000).toISOString().slice(0,10); }
function parseLedger(wb,fileName){
  const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,raw:true,defval:null});
  let period='';
  for(let i=0;i<5;i++){ const m=String((rows[i]||[])[0]||'').match(/Từ ngày\s+([\d/]+)\s+đến ngày\s+([\d/]+)/i); if(m){ period=m[1]+' → '+m[2]; break; } }
  let hr=-1;
  for(let i=0;i<12;i++){ if(String((rows[i]||[])[0]||'').trim()==='Ngày chứng từ'){ hr=i; break; } }
  if(hr<0) return null;
  // collect account block codes, then keep only LEAF cash/bank accounts (11xx) to avoid
  // double counting: parent blocks (111, 112, 1121) repeat the same transactions
  const accSet=new Set();
  for(const r of rows){ const a=String((r||[])[0]||''); if(a.startsWith('Tài khoản:')) accSet.add(a.replace('Tài khoản:','').trim()); }
  const accs=[...accSet];
  const leafCash=accs.filter(x=>x.startsWith('11')&&!accs.some(y=>y!==x&&y.startsWith(x)));
  const out=[]; let acc='';
  for(let i=hr+1;i<rows.length;i++){ const r=rows[i]||[]; const a=String(r[0]||'');
    if(a.startsWith('Tài khoản:')){ acc=a.replace('Tài khoản:','').trim(); continue; }
    if(!leafCash.includes(acc)) continue;
    const desc=s(r[4]); const credit=n(r[9])||0;
    if(!desc||credit<=0) continue;
    out.push({date:xlDate(r[0]),voucher:s(r[1]),desc,code:s(r[5]),flag:s(r[6]),contra:s(r[7]),amt:credit,acc});
  }
  return {rows:out,period,accounts:leafCash,file:fileName||'',importedAt:new Date().toISOString()};
}
function kwSuggest(c){
  const cat=norm(c.category), comp=norm(c.company), con=norm(c.contract);
  const kws=[];
  if(cat.includes('interior design')) kws.push('interior design services','ld07755');
  if(cat.includes('project management')) kws.push('project management','quản lý dự án và giám sát');
  if(cat.includes('quantity surveyor')) kws.push('qs consultancy','cost estimate','hoàn thành dự toán');
  if(cat.includes('mep')) kws.push('mep design','thiết kế cơ điện');
  if(cat.includes('lighting')) kws.push('lighting consultant','lighting design');
  if(cat.includes('art')) kws.push('art consultancy','artwork');
  if(cat.includes('fire')||con.includes('fire')) kws.push('fire safety','smoke extraction','pccc');
  if(cat.includes('mur')&&comp.includes('kv')) kws.push('king room & corridor','mur1');
  if(cat.includes('mur')&&comp.includes('boho')) kws.push('twin room','mur2');
  if(cat.includes('club lounge')) kws.push('club lounge');
  if(cat.includes('operator')||comp.includes('accor')) kws.push('accor');
  if(!kws.length){ const w=(c.company||'').split(/[\s,.]+/).filter(x=>x.length>3); if(w[0]) kws.push(w[0]); }
  return kws.join(', ');
}
function parseContracts(wb){
  const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,raw:true,defval:null});
  let hr=-1;
  for(let i=0;i<12;i++){ const r=rows[i]||[]; if(norm(r[0])==='no.'&&norm(r[2]).includes('company')){ hr=i; break; } }
  if(hr<0) return null;
  const out=[]; let lastComp='',lastCat='';
  for(let i=hr+1;i<rows.length;i++){ const r=rows[i]||[];
    const contract=s(r[3]); const val=n(r[5]);
    if(!contract&&!val) continue;
    const cat=s(r[1])||lastCat, comp=s(r[2])||lastComp;
    lastCat=cat; lastComp=comp;
    const c={id:uid(),category:cat,company:comp,contract,date:xlDate(r[4]),value:val||0,usd:n(r[7])||null,group:s(r[8])||'Other',progress:s(r[6]),kw:''};
    c.kw=kwSuggest(c); out.push(c);
  }
  return out;
}
function payKey(r){ return r.voucher+'|'+r.amt+'|'+norm(r.desc).slice(0,30); }
/* classification: override → VAT (contra 133x) → 642x admin accounts → internal keywords → contract keyword match → other */
function payCat(r){
  const ov=(state.payOverrides||{})[payKey(r)]; if(ov) return ov;
  if((r.contra||'').startsWith('133')) return 'vat';
  if((r.contra||'').startsWith('642')) return 'internal';
  const d=norm(r.desc);
  for(const k of s(state.payKeywords).split(',')){ const kk=norm(k); if(kk.length>=3&&d.includes(kk)) return 'internal'; }
  let best=null,len=0;
  for(const c of (state.contracts||[])){
    for(const k of s(c.kw).split(',')){ const kk=norm(k); if(kk.length>=3&&d.includes(kk)&&kk.length>len){ best=c.id; len=kk.length; } } }
  return best||'other';
}
function payData(){ // classified rows honouring the internal-visibility toggle
  const all=((state.payments||{}).rows||[]).map(r=>({...r,cat:payCat(r)}));
  const visible=state.showInternal?all:all.filter(r=>r.cat!=='internal');
  const sum=list=>list.reduce((x,r)=>x+r.amt,0);
  const vat=visible.filter(r=>r.cat==='vat');
  const internal=all.filter(r=>r.cat==='internal');
  const byContract={};
  for(const r of visible){ if(r.cat!=='vat'&&r.cat!=='internal'&&r.cat!=='other') byContract[r.cat]=(byContract[r.cat]||0)+r.amt; }
  return { all, visible, total:sum(visible), vat:sum(vat), net:sum(visible)-sum(vat),
    internal:sum(internal), internalCount:internal.length,
    other:sum(visible.filter(r=>r.cat==='other')), otherCount:visible.filter(r=>r.cat==='other').length,
    byContract };
}

async function gzipB64(str){ const cs=new CompressionStream('gzip');
  const ab=await new Response(new Blob([str]).stream().pipeThrough(cs)).arrayBuffer();
  const u=new Uint8Array(ab); let s2='';
  for(let i=0;i<u.length;i+=0x8000) s2+=String.fromCharCode.apply(null,u.subarray(i,i+0x8000));
  return btoa(s2); }
async function gunzipB64(b64){ const bin=atob(b64); const u=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) u[i]=bin.charCodeAt(i);
  const ds=new DecompressionStream('gzip');
  const ab=await new Response(new Blob([u]).stream().pipeThrough(ds)).arrayBuffer();
  return new TextDecoder().decode(ab); }

function cmpRows(){
  const A=ver(cmpState.a),B=ver(cmpState.b); const rows=[];
  if(cmpState.level==='item'){
    // occurrence-indexed key: survives QS renumbering, disambiguates repeated descriptions
    const keyed=list=>{ const c={}; const m=new Map();
      for(const i of (list||[])){ const b=norm(i.sheet)+'||'+norm(i.category||i.group)+'||'+norm(i.desc); c[b]=(c[b]||0)+1; m.set(b+'#'+c[b],i); } return m; };
    const mA=keyed(A.items), mB=keyed(B.items);
    const all=new Set([...mA.keys(),...mB.keys()]);
    for(const k of all){ const a=mA.get(k),b=mB.get(k); const src=b||a;
      if(cmpState.sect!=='__all'&&src.sheet!==cmpState.sect) continue;
      rows.push({k,name:src.desc,sub:src.category||src.group||'',sheet:src.sheet,
        aQty:a?a.qty:null,bQty:b?b.qty:null,aRate:a?a.rate:null,bRate:b?b.rate:null,
        a:a?a.total:null,b:b?b.total:null,status:!a?'added':(!b?'removed':'')}); }
  } else if(cmpState.level==='room'){
    const gA=Object.fromEntries((A.summary?A.summary.roomBlocks:[]).map(b=>[b.code,b.total]));
    const gB=Object.fromEntries((B.summary?B.summary.roomBlocks:[]).map(b=>[b.code,b.total]));
    for(const c of new Set([...Object.keys(gA),...Object.keys(gB)])) rows.push({k:'r'+c,name:c,sub:'',sheet:'',a:gA[c]??null,b:gB[c]??null,status:''});
  } else { // sections
    const get=(V)=>{ const out=[]; if(!V.summary) return out;
      for(const sc of V.summary.sections){ let val=sc.subtotal;
        if(cmpState.scope!=='__all'){ val=sc.items.reduce((s2,i)=>s2+((i.perRoom[cmpState.scope]||{}).t||0),0); }
        out.push({name:'▸ '+sc.name,val,isSec:true});
        for(const i of sc.items){ out.push({name:i.desc,val:cmpState.scope==='__all'?i.total:((i.perRoom[cmpState.scope]||{}).t||0),sec:sc.name}); } }
      if(cmpState.scope==='__all'){ for(const a of V.summary.addOns) out.push({name:a.name,val:a.total,sec:t('addOns')});
        out.push({name:t('grand'),val:V.summary.grandTotal,isGrand:true}); }
      return out; };
    const la=get(A),lb=get(B); const mA=new Map(la.map(x=>[norm(x.name),x])),mB=new Map(lb.map(x=>[norm(x.name),x]));
    for(const k2 of new Set([...mA.keys(),...mB.keys()])){ const a=mA.get(k2),b=mB.get(k2); const src=b||a;
      rows.push({k:'s'+k2,name:src.name,sub:src.sec||'',sheet:'',a:a?a.val:null,b:b?b.val:null,isSec:src.isSec,isGrand:src.isGrand,status:''}); }
  }
  for(const r of rows){ r.d=(r.b||0)-(r.a||0); r.dp=(r.a&&r.a!==0)?r.d/Math.abs(r.a):null; }
  let out=rows;
  if(cmpState.q) out=out.filter(r=>norm(r.name+' '+r.sub).includes(norm(cmpState.q)));
  if(cmpState.onlyChanged) out=out.filter(r=>Math.abs(r.d)>1||r.isGrand);
  // item level: biggest movers first; section/room level: keep the workbook's natural order
  if(cmpState.level==='item') out.sort((x,y)=>Math.abs(y.d)-Math.abs(x.d));
  return out;
}

function refLinkify(txt){ return esc(txt).replace(/\b([A-Z]{2,3}-\d{2}[A-Z]?)\b/g,(m0,c)=>`<span class="refcode" onclick="App.goMaterial('${c}')">${c}</span>`); }

function fmtQty(v){ if(v==null||v==='') return '—'; const x=+v; if(!isFinite(x)) return s(v); return x.toLocaleString('en-US',{maximumFractionDigits:2}); }
/* unique picker entries: same description can exist on several sheets/categories with different qty & rate */
let qcLinkMap=new Map();
function qcItemOptions(){ const v=activeVer(); const items=(v&&v.items)||[]; qcLinkMap=new Map(); const cnt={}; const out=[];
  for(const i of items.slice(0,1500)){ if(!i.desc) continue;
    const sheetShort=i.sheet.replace(/^\d+(\.\d+)?\.?\s*/,'').slice(0,20);
    const catShort=s(i.category||i.group).slice(0,20);
    let val=i.desc.slice(0,64)+' ⟨'+sheetShort+(catShort?' · '+catShort:'')+'⟩';
    cnt[val]=(cnt[val]||0)+1; if(cnt[val]>1) val+=' #'+cnt[val];
    qcLinkMap.set(val,i.id);
    out.push({val,label:(i.qty!=null?fmtQty(i.qty)+' '+s(i.unit):'')+(i.rate!=null?' @ '+money(i.rate,'VND'):'')});
  }
  return out;
}
function veCalc(base,nw,q){ base=n(base)||0;nw=n(nw)||0;q=n(q)||0;
  return {ud:nw-base,cur:base*q,prop:nw*q,vari:(nw-base)*q,p:base?(nw-base)/base:null}; }
function veBadge(x){ return x>0.5?`<span class="chip r">${t('overrun')}</span>`:(x<-0.5?`<span class="chip g">${t('saving')}</span>`:`<span class="chip n">${t('onBudget')}</span>`); }

function keepFocus(fn){ const ae=document.activeElement; const id=ae?ae.id:null; const pos=(ae&&ae.selectionStart!=null)?ae.selectionStart:null;
  fn(); if(id){ const el=document.getElementById(id); if(el){ el.focus(); if(pos!=null){ try{ el.setSelectionRange(pos,pos); }catch(e){} } } } }

function renderMaterials(){
  const el=$('#tab-materials'); const v=activeVer(); const mats=(v&&v.materials)||[];
  const list=mats.filter(m=>!matQ||norm(m.ref+' '+m.item+' '+m.desc+' '+m.supplier+' '+m.area+' '+m.category).includes(norm(matQ)));
  let html='',lastCat='';
  for(const m of list){ if(m.category!==lastCat){ lastCat=m.category; if(lastCat) html+=`<tr class="sect"><td colspan="7">${esc(lastCat)}</td></tr>`; }
    html+=`<tr id="mat-${esc(m.ref)}"><td><b>${esc(m.ref)}</b></td><td>${esc(m.item)}</td><td>${esc(m.area).replace(/\n/g,'<br>')}</td>
    <td style="white-space:pre-line">${esc(m.desc)}</td><td style="white-space:pre-line;font-size:12px">${esc(m.supplier)}</td>
    <td>${m.ve?`<span class="chip ${norm(m.ve)!==norm((m.supplier||'').split('\n')[0])?'a':'n'}">${esc(m.ve)}</span>`:''}</td>
    <td style="font-size:12px">${esc(m.remarks)}</td></tr>`; }
  el.innerHTML=`
  <div class="panel"><h3>🧱 ${t('matT')} <span class="chip n">${mats.length}</span></h3><div class="help">${t('matTip')}</div>
  <div class="toolbar" style="margin-top:10px"><input id="matQ" placeholder="${t('search')}" value="${esc(matQ)}" oninput="App.matSearch(this.value)" style="width:280px">
    <span class="sp"></span>
    <button class="btn ghost" onclick="App.tabXlsx()">${t('exportTab')}</button>
    <button class="btn ghost" onclick="App.tabPdf()">${t('printTab')}</button></div>
  ${mats.length?`<div class="tblwrap" style="max-height:70vh"><table><thead><tr><th>${t('ref')}</th><th>${t('item')}</th><th>${t('area')}</th><th style="min-width:220px">${t('spec')}</th><th>${t('supplier')}</th><th>${t('veAlt')}</th><th>${t('remarks')}</th></tr></thead><tbody>${html}</tbody></table></div>`:`<div class="help">${t('noMats')}</div>`}
  </div>`;
}

/* ============================== render: rate studio ============================== */
let rateState={q:'',cat:'__all',onlyQs:false,onlyAll:false};
function renderRates(){
  const el=$('#tab-rates'); const v=activeVer();
  const head=`<div class="panel"><h3>⚖ ${t('ratesT')}
    <span style="margin-left:auto" class="noprint">
      <button class="btn sm ghost" onclick="App.tabXlsx()">${t('exportTab')}</button>
      <button class="btn sm ghost" onclick="App.tabPdf()">${t('printTab')}</button></span></h3>
    <div class="help">${t('ratesTip')}</div>
    <div class="toolbar" style="margin-top:10px">
      <button class="btn gold" onclick="$('#fileQuote').click()">${t('impQuote')}</button>
      ${state.quotes.map(q=>`<span class="chip b" title="${esc(q.file)} · ${q.items.length} items">${esc(q.name.slice(0,34))}
        <span style="cursor:pointer;margin-left:4px" onclick="App.quoteDel('${q.id}')">✕</span></span>`).join('')}
    </div></div>`;
  if(!state.quotes.length){ el.innerHTML=head+`<div class="panel"><div class="help">${t('noQuotes')}</div></div>`; return; }
  const rows=rateRows(); const st2=rateStats(rows);
  const cards=`<div class="cards">
    <div class="card"><div class="lbl">${t('srcs')}</div><div class="val">${state.quotes.length}</div>
      <div class="sub">${state.quotes.map(q=>q.items.filter(i=>i.rate>0).length+' '+t('ratePairs')).join(' · ')}</div></div>
    <div class="card"><div class="lbl">${t('matchedRows')}</div><div class="val">${st2.matched}</div><div class="sub">${rows.length} rows</div></div>
    ${state.quotes.map(q=>{ const p=st2.per[q.id]; const d=p&&p.den?(p.num/p.den-1):null;
      return `<div class="card"><div class="lbl">${esc(q.name.slice(0,26))} — ${t('avgVsQs')}</div>
      <div class="val ${d==null?'':cls(d)}" style="font-size:19px">${d==null?'—':sign(d)+pct(d)}</div>
      <div class="sub">${p?p.n+' '+t('ratePairs'):''} · ${t('avgNote')}</div></div>`; }).join('')}
    <div class="card"><div class="lbl">${t('potSaving')}</div><div class="val neg" style="font-size:19px">−${money(st2.saving)}</div></div>
    <div class="card"><div class="lbl">${t('potOverrun')}</div><div class="val pos" style="font-size:19px">+${money(st2.exposure)}</div></div>
  </div>`;
  // filters
  const cats=[...new Set(rows.map(r=>r.cat).filter(Boolean))];
  let list=rows;
  if(rateState.cat!=='__all') list=list.filter(r=>r.cat===rateState.cat);
  if(rateState.q) list=list.filter(r=>norm(r.desc+' '+r.cat+' '+r.sub).includes(norm(rateState.q)));
  if(rateState.onlyQs) list=list.filter(r=>r.qs&&!r.qs.ambiguous);
  if(rateState.onlyAll) list=list.filter(r=>state.quotes.every(q=>r.per[q.id]));
  // table
  const srcHdr=state.quotes.map(q=>`<th class="num">${esc(q.name.slice(0,22))}<div style="font-weight:400;font-size:10px">${t('srcCol')}</div></th>`).join('');
  let html='',lastCat='';
  for(const r of list.slice(0,700)){
    if(r.cat!==lastCat){ lastCat=r.cat; html+=`<tr class="sect"><td colspan="${5+state.quotes.length}">${esc(r.cat||'—')}</td></tr>`; }
    const qsRate=(r.qs&&!r.qs.ambiguous)?r.qs.item.rate:null;
    const quoted=Object.values(r.per).map(x=>x.rate).filter(x=>x>0);
    const best=quoted.length?Math.min(...quoted):null;
    let qsCell;
    if(r.qs&&r.qs.ambiguous){
      qsCell=`<span class="chip a">${t('ambiguous')}</span><br><select style="font-size:10.5px;max-width:150px" class="noprint" onchange="App.rateLink('${btoa(encodeURIComponent(r.key))}',this.value)">
        <option value="">${t('resolveQs')}</option>
        ${r.qs.candidates.map(c2=>`<option value="${c2.id}">${money(c2.rate,'VND')} · ${esc(c2.sheet.slice(0,16))}</option>`).join('')}
        <option value="none">${t('noQs')}</option></select>`;
    } else if(qsRate!=null){ qsCell=money(qsRate)+(r.qs.manual?' <span class="chip n">✎</span>':''); }
    else qsCell=`<span style="color:var(--mut)">—</span>`;
    const srcCells=state.quotes.map(q=>{ const p=r.per[q.id];
      if(!p||!(p.rate>0)) return `<td class="num" style="color:var(--mut)">—</td>`;
      let dd=''; if(qsRate>0){ const dp=p.rate/qsRate-1; dd=`<div style="font-size:10.5px" class="${cls(dp)}">${sign(dp)}${pct(dp)}</div>`; }
      return `<td class="num" style="${best!=null&&p.rate===best&&quoted.length>1?'background:var(--greenbg)':''}"><b>${money(p.rate)}</b>${dd}${p.remark?`<div style="font-size:10px;color:var(--mut)" title="${esc(p.remark)}">${esc(p.remark.slice(0,18))}</div>`:''}</td>`; }).join('');
    const bestVs=(qsRate>0&&best!=null)?(best/qsRate-1):null;
    html+=`<tr><td>${esc(r.desc)}${r.sub?`<div style="font-size:11px;color:var(--mut)">${esc(r.sub)}</div>`:''}</td>
      <td>${esc(r.unit)}</td>
      <td class="num">${qsCell}</td>
      ${srcCells}
      <td class="num ${bestVs==null?'':cls(bestVs)}">${bestVs==null?'—':sign(bestVs)+pct(bestVs)}</td>
      <td class="noprint">${qsRate>0&&best!=null?`<button class="btn sm ghost" title="${t('toVE')}" onclick="App.rateToVE('${btoa(encodeURIComponent(r.key))}')">${t('toVE')}</button>`:''}</td></tr>`;
  }
  el.innerHTML=head+cards+`
  <div class="panel"><div class="toolbar">
    <select onchange="App.rateSet('cat',this.value)"><option value="__all">${t('all')}</option>${cats.map(c2=>`<option ${rateState.cat===c2?'selected':''}>${esc(c2)}</option>`).join('')}</select>
    <input id="rateQ" placeholder="${t('search')}" value="${esc(rateState.q)}" oninput="App.rateSet('q',this.value)" style="width:220px">
    <label style="font-size:12px"><input type="checkbox" ${rateState.onlyQs?'checked':''} onchange="App.rateSet('onlyQs',this.checked)"> ${t('onlyQs')}</label>
    <label style="font-size:12px"><input type="checkbox" ${rateState.onlyAll?'checked':''} onchange="App.rateSet('onlyAll',this.checked)"> ${t('onlyAll')}</label>
    <span class="chip n">${list.length}</span></div>
  <div class="tblwrap" style="max-height:64vh"><table><thead><tr>
    <th style="min-width:260px">${t('desc')}</th><th>${t('unit')}</th><th class="num">${t('qsRate')}</th>${srcHdr}<th class="num">${t('bestVs')}</th><th class="noprint"></th></tr></thead>
    <tbody>${html}</tbody></table></div></div>`;
}

/* ============================== render: payments ============================== */
let payState={q:'',cat:'__all',month:'__all',sort:'date',dir:-1};
function renderPay(){
  const el=$('#tab-pay'); const P=state.payments;
  const cloudBtns=state.cloudEnabled?`<button class="btn ghost" onclick="App.cloudPush()">☁⬆ ${t('push')}</button>
    <button class="btn ghost" onclick="App.cloudPull()">☁⬇ ${t('pull')}</button>`:'';
  const head=`<div class="panel"><h3>💳 ${t('payT')}</h3><div class="help">${t('payTip')}<br><b>${t('ledgerHint')}</b></div>
   <div class="toolbar" style="margin-top:10px">
    <button class="btn gold" onclick="$('#fileLedger').click()">${t('impLedger')}</button>
    <button class="btn" onclick="$('#fileContracts').click()">${t('impContracts')} (${(state.contracts||[]).length})</button>
    <button class="btn ghost" onclick="App.tabXlsx()">${t('exportTab')}</button>
    <button class="btn ghost" onclick="App.tabPdf()">${t('printTab')}</button>
    <span class="sp"></span>${cloudBtns}
    <button class="btn ${state.showInternal?'':'ghost'}" onclick="App.togglePayInternal()">${state.showInternal?t('hideInternal'):t('showInternal')}</button>
   </div></div>`;
  if(!P||!(P.rows||[]).length){ el.innerHTML=head+`<div class="panel"><div class="help">${t('noLedger')}</div></div>`; return; }
  const D=payData();
  const cards=`
  <div class="cards">
    <div class="card"><div class="lbl">${t('paidTotal')}</div><div class="val">${money(D.total)}</div>
      <div class="sub">${t('asOf')}: ${esc(P.period)} · ${D.visible.length} ${t('payRows')}${state.showInternal?'':' · <span class="chip a">'+t('internalHiddenChip')+'</span>'}</div></div>
    <div class="card"><div class="lbl">${t('paidNet')}</div><div class="val">${money(D.net)}</div></div>
    <div class="card"><div class="lbl">${t('vatPaid')}</div><div class="val">${money(D.vat)}</div></div>
    ${state.showInternal?`<div class="card" style="border-left:4px solid var(--amber)"><div class="lbl">${t('internalTotal')}</div><div class="val">${money(D.internal)}</div><div class="sub">${D.internalCount} ${t('payRows')}</div></div>`:''}
    <div class="card"><div class="lbl">${t('unmatchedTotal')}</div><div class="val">${money(D.other)}</div><div class="sub">${D.otherCount} ${t('payRows')}</div></div>
  </div>
  ${state.showInternal?`<div class="panel noprint" style="border-left:4px solid var(--amber)"><h3>🔑 ${t('internalCat')} — ${t('kw')}</h3>
    <div class="help" style="margin-bottom:6px">${t('kwHint')} (+ ${accName('64217')}, ${accName('64276')}, ${accName('64282')}, ${accName('64288')})</div>
    <textarea rows="2" style="width:100%" onchange="App.set('payKeywords',this.value)">${esc(state.payKeywords)}</textarea></div>`
  :`<div class="warnbox noprint">${t('internalNote')}</div>`}`;
  // contract tracking table
  let conH='';
  if((state.contracts||[]).length){
    const groups=[...new Set(state.contracts.map(c=>c.group||'Other'))];
    let rows='';
    for(const g of groups){
      const cs=state.contracts.filter(c=>(c.group||'Other')===g);
      rows+=`<tr class="grp"><td colspan="8">${esc(g)}</td></tr>`;
      let gv=0,gp=0;
      const companies=[...new Set(cs.map(c=>c.company))];
      for(const comp of companies){
        const cc=cs.filter(c=>c.company===comp);
        const cv=cc.reduce((x,c)=>x+c.value,0);
        const cp=cc.reduce((x,c)=>x+(D.byContract[c.id]||0),0);
        const rem=cv-cp; const pr=cv?cp/cv:null; gv+=cv; gp+=cp;
        rows+=`<tr class="sect"><td><b>${esc(cc[0].category)}</b><div style="font-size:11px;font-weight:400;color:var(--mut)">${esc(comp)}</div></td>
          <td style="font-size:11.5px;color:var(--mut)">${cc.length} ${t('contract').toLowerCase()}${cc.length>1?'s':''}</td>
          <td class="num">${money(cv)}</td><td class="num"><b>${money(cp)}</b></td>
          <td class="num ${rem<0?'pos':''}">${money(rem)}</td>
          <td style="min-width:110px">${pr==null?'—':`<div>${pct(pr)}</div><div class="bar"><i style="width:${Math.min(100,pr*100).toFixed(1)}%;background:${pr>1?'var(--red)':'var(--gold)'}"></i></div>`}</td>
          <td></td><td></td></tr>`;
        for(const c of cc){ const solo=cc.length===1?(D.byContract[c.id]||0):null;
          rows+=`<tr><td style="padding-left:26px;color:var(--mut)">↳</td>
            <td style="font-size:12px">${esc(c.contract)}<div style="font-size:11px;color:var(--mut)">${esc(c.date)}</div></td>
            <td class="num">${money(c.value)}</td><td class="num">${solo!=null?money(solo):'—'}</td><td></td><td></td>
            <td><input value="${esc(c.kw)}" style="width:170px;font-size:11.5px" title="${t('kwHint')}" onchange="App.conKw('${c.id}',this.value)"></td>
            <td><button class="btn sm danger noprint" onclick="App.conDel('${c.id}')">✕</button></td></tr>`; }
      }
      rows+=`<tr class="total"><td colspan="2">${esc(g)} — TOTAL</td><td class="num">${money(gv)}</td><td class="num">${money(gp)}</td><td class="num">${money(gv-gp)}</td><td>${gv?pct(gp/gv):'—'}</td><td></td><td></td></tr>`;
    }
    conH=`<div class="panel"><h3>📜 ${t('contractsT')}</h3><div class="help" style="margin-bottom:8px">${t('kwHint')}</div>
      <div class="tblwrap" style="max-height:56vh"><table><thead><tr><th>${t('category')}</th><th>${t('contract')}</th><th class="num">${t('contractVal')}</th><th class="num">${t('paidToDate')}</th><th class="num">${t('remaining')}</th><th>${t('progress')}</th><th>${t('kw')}</th><th></th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  }
  // detail table
  const cats=[['__all',t('allCats')],['vat',t('vatCat')],['other',t('otherCat')]]
    .concat(state.showInternal?[['internal',t('internalCat')]]:[])
    .concat((state.contracts||[]).map(c=>[c.id,(c.category||c.company).slice(0,40)]));
  let list=D.visible;
  if(payState.cat!=='__all') list=list.filter(r=>r.cat===payState.cat);
  if(payState.month!=='__all') list=list.filter(r=>(r.date||'').slice(0,7)===payState.month);
  if(payState.q) list=list.filter(r=>norm(r.desc+' '+r.voucher+' '+r.code).includes(norm(payState.q)));
  const months=[...new Set(D.visible.map(r=>(r.date||'').slice(0,7)).filter(Boolean))].sort().reverse();
  const listSum=list.reduce((x,r)=>x+r.amt,0);
  { const sf=payState.sort, dir=payState.dir;
    list=list.slice().sort((a,b)=>{ let x,y;
      if(sf==='amt'){ x=a.amt; y=b.amt; return (x-y)*dir; }
      if(sf==='cat'){ x=catLabel(a.cat); y=catLabel(b.cat); }
      else { x=s(a[sf]); y=s(b[sf]); }
      return String(x).localeCompare(String(y))*dir; }); }
  const arrow=f=>payState.sort===f?(payState.dir>0?' ▲':' ▼'):'';
  const sth=(f,label,cls2)=>`<th class="${cls2||''}" style="cursor:pointer" title="${t('sortHint')}" onclick="App.paySort('${f}')">${label}${arrow(f)}</th>`;
  const assignOpts=r=>['','vat','internal','other'].map(x=>`<option value="${x}" ${r.cat===x?'selected':''}>${x?catLabel(x):t('assign')}</option>`).join('')
    +(state.contracts||[]).map(c=>`<option value="${c.id}" ${r.cat===c.id?'selected':''}>${esc((c.category||c.company).slice(0,36))}</option>`).join('');
  const detRows=list.slice(0,600).map(r=>`<tr>
    <td style="white-space:nowrap">${r.date}</td><td>${esc(r.voucher)}</td>
    <td style="min-width:280px">${esc(r.desc)}<div style="font-size:11px;color:var(--mut)">${esc(r.code)}</div></td>
    <td style="font-size:11.5px;white-space:nowrap">${accName(r.contra)}</td>
    <td><span class="chip ${r.cat==='vat'?'n':r.cat==='internal'?'a':r.cat==='other'?'r':'b'}">${esc(catLabel(r.cat))}</span></td>
    <td class="noprint"><select style="font-size:11px;max-width:140px" onchange="App.payAssign('${btoa(encodeURIComponent(payKey(r)))}',this.value)">${assignOpts(r)}</select></td>
    <td class="num"><b>${money(r.amt)}</b></td></tr>`).join('');
  const detH=`<div class="panel"><h3>🧾 ${t('payDetailT')} <span class="chip n">${list.length}</span> <span class="chip b">${money(listSum)}</span></h3>
    <div class="toolbar"><select onchange="App.paySet('cat',this.value)">${cats.map(([v2,l])=>`<option value="${v2}" ${payState.cat===v2?'selected':''}>${esc(l)}</option>`).join('')}</select>
      <select onchange="App.paySet('month',this.value)"><option value="__all">${t('allMonths')}</option>${months.map(m=>`<option value="${m}" ${payState.month===m?'selected':''}>${m}</option>`).join('')}</select>
      <input id="payQ" placeholder="${t('search')}" value="${esc(payState.q)}" oninput="App.paySet('q',this.value)" style="width:230px"></div>
    <div class="tblwrap" style="max-height:58vh"><table><thead><tr>${sth('date',t('vDate'))}${sth('voucher',t('voucher'))}${sth('desc',t('desc'))}${sth('contra',t('contraAcc'))}${sth('cat',t('catCol'))}<th class="noprint"></th>${sth('amt',t('amount'),'num')}</tr></thead><tbody>${detRows}</tbody></table></div></div>`;
  const chartH=`<div class="panel"><h3>📅 ${t('monthChart')}</h3><div class="chartbox" style="height:240px"><canvas id="chPayMonth"></canvas></div></div>`;
  el.innerHTML=head+cards+conH+chartH+detH;
  // month chart
  const byM={};
  for(const r of D.visible){ const m=(r.date||'').slice(0,7)||'?'; byM[m]=(byM[m]||0)+r.amt; }
  const ms=Object.keys(byM).sort();
  mkChart('chPayMonth',{type:'bar',data:{labels:ms,datasets:[{data:ms.map(m=>byM[m]),backgroundColor:'#1f3a5f'}]},
    options:{maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+compact(c.raw)}}},
      scales:{y:{ticks:{callback:x=>compact(x)}},x:{ticks:{font:{size:10}}}}}});
}

  ${attCache.length?`<div class="atts">${cards}</div>`:`<div class="help">${t('noAtts')}</div>`}</div>`;

     for(const r of rows){ const qsOk=r.qs&&!r.qs.ambiguous;

 // reports
 reportXlsx(){ if(typeof XLSX==='undefined'){ toast(t('libFail')); return; }
   const v=activeVer(); if(!v){ toast(t('needOne')); return; }
   const fx=v.fx||state.fx; const wb=XLSX.utils.book_new();
   const br=areaBreakdown(v); const all=AREAS.reduce((x,a)=>x+br[a.id].file+br[a.id].manual,0)||1;
   const s1=[['SOFITEL SAIGON PLAZA RENOVATION — '+t('repTitle')],
     [t('repVersion'),v.name,'',t('vDate'),v.date],[t('repGenerated'),new Date().toLocaleString(),'','FX (VND/USD)',fx],[],
     [t('areasT')],[t('name'),t('fromFile')+' (VND)',t('manualCol')+' (VND)',t('areaTotal')+' (VND)',t('share')]];
   for(const a of AREAS){ const b=br[a.id]; s1.push([t(a.k)+' — '+t(a.sub),b.file,b.manual,b.file+b.manual,(b.file+b.manual)/all]); }
   s1.push([t('allAreas'),AREAS.reduce((x,a)=>x+br[a.id].file,0),AREAS.reduce((x,a)=>x+br[a.id].manual,0),all,1]);
   if(v.summary){ const su=v.summary;
     s1.push([],[t('repSections')],[t('item'),'TOTAL (VND)','TOTAL (USD)']);
     for(const sc of su.sections) s1.push([sc.name,sc.subtotal,Math.round((sc.subtotal||0)/fx)]);
     for(const a of su.addOns) s1.push([a.name,a.total,Math.round((a.total||0)/fx)]);
     s1.push(['Nett Construction Cost',su.nett,Math.round((su.nett||0)/fx)]);
     s1.push(['TOTAL PROJECT CONSTRUCTION COST',su.grandTotal,Math.round((su.grandTotal||0)/fx)]);
     s1.push([t('forecastTotal')+' ('+t('inclPrelims')+' '+state.prelimsPct+'%)',Math.round(forecastGrand(v)||0),Math.round((forecastGrand(v)||0)/fx)]);
     if(su.perKey.length){ s1.push([],[t('repPerKey')],[t('name'),'TOTAL (VND)','Per key (USD)']);
       for(const p of su.perKey) s1.push([p.name,p.totalVND,p.perKeyUSD?Math.round(p.perKeyUSD):'']); } }
   const ws1=XLSX.utils.aoa_to_sheet(s1); ws1['!cols']=[{wch:52},{wch:18},{wch:16},{wch:18},{wch:10}];
   XLSX.utils.book_append_sheet(wb,ws1,'Summary');
   const r2=[[t('sheet'),t('section'),'No',t('desc'),t('qty'),t('unit'),t('rate'),'Base total','Adj. qty','Adj. rate','Adj. total','Δ',t('inc')]];
   for(const it of v.items){ const e=itemEff(v,it);
     r2.push([it.sheet,it.category||it.group,it.no,it.desc,it.qty,it.unit,it.rate,it.total,e.qty,e.rate,e.total,e.total-it.total,e.inc?'Y':'N']); }
   for(const ni of (v.newItems||[])){ const tt=(n(ni.qty)||0)*(n(ni.rate)||0);
     r2.push(['(new)',ni.category,'',ni.desc,ni.qty,ni.unit,ni.rate,0,ni.qty,ni.rate,tt,tt,ni.inc!==false?'Y':'N']); }
   const ws2=XLSX.utils.aoa_to_sheet(r2); ws2['!cols']=[{wch:20},{wch:26},{wch:6},{wch:60},{wch:10},{wch:7},{wch:12},{wch:15},{wch:9},{wch:12},{wch:15},{wch:13},{wch:5}];
   XLSX.utils.book_append_sheet(wb,ws2,'BOQ');
   if(state.options.length){ const r3=[[t('optTitle'),t('study'),t('qty'),t('unit'),t('curRate'),t('newRate'),t('variation')+' (VND)','Δ%',t('include'),t('notes')]];
     for(const o of state.options){ const r=veCalc(o.baseRate,o.newRate,o.qty);
       r3.push([o.title,o.study,o.qty,o.unit,n(o.baseRate),n(o.newRate),r.vari,r.p,o.include?'Y':'N',o.notes]); }
     const ws3=XLSX.utils.aoa_to_sheet(r3); ws3['!cols']=[{wch:38},{wch:16},{wch:9},{wch:7},{wch:13},{wch:13},{wch:16},{wch:8},{wch:8},{wch:42}];
     XLSX.utils.book_append_sheet(wb,ws3,'VE Options'); }
   if((v.materials||[]).length){ const r4=[[t('ref'),t('category'),t('item'),t('area'),t('spec'),t('supplier'),t('veAlt')]];
     for(const m of v.materials) r4.push([m.ref,m.category,m.item,m.area,m.desc,m.supplier,m.ve]);
     const ws4=XLSX.utils.aoa_to_sheet(r4); ws4['!cols']=[{wch:9},{wch:18},{wch:18},{wch:18},{wch:46},{wch:36},{wch:18}];
     XLSX.utils.book_append_sheet(wb,ws4,'Materials'); }
   const base=ver(state.baseId);
   if(base&&base.id!==v.id&&base.summary&&v.summary){
     const r5=[[t('compare')+': A = '+base.name+' → B = '+v.name],[t('item'),'A (VND)','B (VND)',t('diff')]];
     const mA=new Map(base.summary.sections.map(x=>[x.name,x.subtotal]));
     for(const sc of v.summary.sections) r5.push([sc.name,mA.get(sc.name)??'',sc.subtotal,(sc.subtotal||0)-(mA.get(sc.name)||0)]);
     r5.push(['TOTAL PROJECT',base.summary.grandTotal,v.summary.grandTotal,v.summary.grandTotal-base.summary.grandTotal]);
     const ws5=XLSX.utils.aoa_to_sheet(r5); ws5['!cols']=[{wch:44},{wch:18},{wch:18},{wch:16}];
     XLSX.utils.book_append_sheet(wb,ws5,'Compare'); }
   XLSX.writeFile(wb,'SSP-Budget-Report-'+new Date().toISOString().slice(0,10).replace(/-/g,'')+'.xlsx');
   toast('✓ Excel'); },
 reportPdf(){ const v=activeVer(); if(!v){ toast(t('needOne')); return; }
   document.getElementById('printReport').innerHTML=buildReportHtml(v);
   document.body.classList.add('rpt');

 // export / import / wipe
 async exportJson(){
   const inc=$('#expAtts')?$('#expAtts').checked:true;
   const payload={app:'ssp-budget-tracker',v:1,exportedAt:new Date().toISOString(),state:JSON.parse(JSON.stringify(state)),attachments:inc?await fAll():[]};
   const blob=new Blob([JSON.stringify(payload)],{type:'application/json'});
   const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
   a.download='SSP-BudgetTracker-'+new Date().toISOString().slice(0,10).replace(/-/g,'')+'.json'; a.click();
   setTimeout(()=>URL.revokeObjectURL(a.href),4000); toast('✓ '+t('exportBtn')); },
 async importJson(file){
   const txt=await file.text(); let p;
   try{ p=JSON.parse(txt); }catch(e){ toast('Invalid JSON'); return; }
   if(!p||p.app!=='ssp-budget-tracker'||!p.state){ toast('Not a tracker backup'); return; }
   if(!confirm(t('confirmImport'))) return;
   const keepCloud=state.cloud;
   state=Object.assign({lang:'en',currency:'VND',fx:26450,prelimsPct:7,contPct:0,budgetTarget:null,versions:[],activeId:null,baseId:null,options:[],manualAreas:[],attDir:'Attachments',cloud:{apiKey:'',binId:'',lastPush:null,lastPull:null},cloudEnabled:true,roomLabel:'code',compRef:'auto',payments:null,contracts:[],payKeywords:PAY_KW_DEFAULT,payOverrides:{},showInternal:false,quotes:[],rateLinks:{},tab:'dash'},p.state);
   if((!state.cloud||!state.cloud.apiKey)&&keepCloud&&keepCloud.apiKey) state.cloud=keepCloud;
   await fClear(); attCache=[];
   for(const f of (p.attachments||[])){ await fPut(f); attCache.push(f); }
   save(); renderAll(); toast('✓ '+t('importBtn')); },
 async wipe(){ if(!confirm(t('confirmWipe'))) return;
   state={lang:state.lang,currency:'VND',fx:26450,prelimsPct:7,contPct:0,budgetTarget:null,versions:[],activeId:null,baseId:null,options:[],manualAreas:[],attDir:'Attachments',cloud:{apiKey:'',binId:'',lastPush:null,lastPull:null},cloudEnabled:true,roomLabel:'code',compRef:'auto',payments:null,contracts:[],payKeywords:PAY_KW_DEFAULT,payOverrides:{},showInternal:false,quotes:[],rateLinks:{},tab:'dash'};
   await fClear(); attCache=[]; save(); renderAll(); }
};
window.App=App; window.closeModal=closeModal; window.qc=qc; window.$=$; window.__state=()=>state;

$('#fileXlsx').addEventListener('change',e=>{ const f=e.target.files[0]; e.target.value=''; if(f) App.readXlsxFile(f); });

$('#fileImport').addEventListener('change',e=>{ const f=e.target.files[0]; e.target.value=''; if(f) App.importJson(f); });

$('#fileLedger').addEventListener('change',e=>{ const f=e.target.files[0]; e.target.value=''; if(f) App.readLedgerFile(f); });

/* test hook: load workbook from URL (used for automated verification) */
window.__loadXlsxFromUrl=async function(url,name){
  const buf=await (await fetch(url)).arrayBuffer();
  const wb=XLSX.read(buf,{type:'array'});
  const v=parseWorkbook(wb,name||url.split('/').pop());
  state.versions.push(v); state.activeId=v.id; if(!state.baseId) state.baseId=v.id; if(v.fx) state.fx=v.fx;
  save(); renderAll(); return {grand:grandOf(v),nett:v.summary?v.summary.nett:null,items:v.items.length,mats:v.materials.length,rooms:v.rooms.length,sections:v.summary?v.summary.sections.length:0,warnings:v.warnings,perKey:v.summary?v.summary.perKey:[],blocks:v.summary?v.summary.roomBlocks.length:0};
};

/* ============================== boot ============================== */
(async function(){
  try{ db=await idbOpen();
    const saved=await kvGet('state');
    if(saved) state=Object.assign(state,saved);
    attCache=await fAll();
  }catch(e){ try{ const ls=localStorage.getItem('ssp_bt'); if(ls) state=Object.assign(state,JSON.parse(ls)); }catch(e2){} }
  if(typeof XLSX==='undefined'){ setTimeout(()=>toast(t('libFail')),800); }
  state.tab=state.tab||'dash';
  renderAll();
})();
