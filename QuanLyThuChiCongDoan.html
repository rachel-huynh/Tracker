<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quản lý Thu - Chi Công đoàn cơ sở</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Segoe UI", Arial, sans-serif; font-size: 14px; color: #1f2937; background: #f3f4f6; }
#app { display: flex; min-height: 100vh; }

/* ===== Sidebar ===== */
#sidebar { width: 230px; background: #1e3a5f; color: #e5e7eb; flex-shrink: 0; display: flex; flex-direction: column; }
#sidebar h1 { font-size: 15px; padding: 16px 14px 4px; color: #fff; line-height: 1.35; }
#sidebar .sub { font-size: 11.5px; color: #9db4cc; padding: 0 14px 12px; border-bottom: 1px solid #2d4d75; }
#sidebar nav { flex: 1; overflow-y: auto; padding: 8px 0; }
#sidebar nav button { display: block; width: 100%; text-align: left; background: none; border: none; color: #cfdbe8; padding: 9px 16px; font-size: 13.5px; cursor: pointer; border-left: 3px solid transparent; }
#sidebar nav button:hover { background: #2d4d75; color: #fff; }
#sidebar nav button.active { background: #2d4d75; color: #fff; border-left-color: #f59e0b; font-weight: 600; }
#sidebar nav .grp { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: #7f97b2; padding: 12px 16px 4px; }
#sidebar .foot { font-size: 11px; color: #7f97b2; padding: 10px 14px; border-top: 1px solid #2d4d75; }

/* ===== Main ===== */
#main { flex: 1; padding: 20px 24px; max-width: 1200px; }
.module { display: none; }
.module.active { display: block; }
h2.mtitle { font-size: 19px; color: #1e3a5f; margin-bottom: 14px; }
.card { background: #fff; border: 1px solid #d1d5db; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
.card h3 { font-size: 15px; color: #1e3a5f; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #e5e7eb; }

/* ===== Forms ===== */
.frm { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px 14px; }
.frm .fw { grid-column: 1 / -1; }
.frm .half { grid-column: span 2; }
.fld label { display: block; font-size: 12px; font-weight: 600; color: #4b5563; margin-bottom: 3px; }
.fld input[type=text], .fld input[type=date], .fld input[type=number], .fld select, .fld textarea {
  width: 100%; padding: 6px 8px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 13.5px; font-family: inherit; background: #fff; }
.fld textarea { resize: vertical; min-height: 54px; }
.fld input:focus, .fld select:focus, .fld textarea:focus { outline: 2px solid #93c5fd; border-color: #3b82f6; }
.fld input[readonly] { background: #f9fafb; color: #6b7280; }
.hint { font-size: 11.5px; color: #6b7280; margin-top: 2px; }
.chkline { display: flex; align-items: center; gap: 6px; font-size: 13px; }

/* ===== Buttons ===== */
button.btn { padding: 7px 16px; border: 1px solid #1e3a5f; background: #1e3a5f; color: #fff; border-radius: 4px; font-size: 13.5px; cursor: pointer; }
button.btn:hover { background: #2d4d75; }
button.btn.sec { background: #fff; color: #1e3a5f; }
button.btn.sec:hover { background: #eff6ff; }
button.btn.warn { background: #fff; color: #b91c1c; border-color: #b91c1c; }
button.btn.warn:hover { background: #fef2f2; }
button.mini { padding: 3px 8px; font-size: 12px; border: 1px solid #94a3b8; background: #fff; color: #334155; border-radius: 3px; cursor: pointer; margin: 1px 2px 1px 0; white-space: nowrap; }
button.mini:hover { background: #e0e7ef; }
button.mini.del { color: #b91c1c; border-color: #dca5a5; }
button.mini.del:hover { background: #fef2f2; }
.btnrow { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center; }

/* ===== Tables ===== */
table.tbl { width: 100%; border-collapse: collapse; font-size: 13px; background: #fff; }
table.tbl th, table.tbl td { border: 1px solid #d1d5db; padding: 5px 7px; text-align: left; vertical-align: top; }
table.tbl th { background: #eef2f7; color: #1e3a5f; font-size: 12px; white-space: nowrap; }
table.tbl th.sortable { cursor: pointer; user-select: none; }
table.tbl th.sortable:hover { background: #dbe4ef; }
table.tbl th.sorted { background: #d3deeb; }
table.tbl td.num, table.tbl th.num { text-align: right; white-space: nowrap; font-variant-numeric: tabular-nums; }
table.tbl tr.sum td { font-weight: 700; background: #f8fafc; }
table.tbl td input, table.tbl td select { width: 100%; border: 1px solid transparent; background: transparent; padding: 3px 4px; font-size: 13px; font-family: inherit; }
table.tbl td input:hover { border-color: #cbd5e1; }
table.tbl td input:focus { border-color: #3b82f6; background: #fff; outline: none; }
table.tbl td input.num { text-align: right; }
.tblwrap { overflow-x: auto; }
.searchrow { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
.searchrow input, .searchrow select { padding: 6px 8px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 13px; }
.searchrow input[type=text] { min-width: 240px; }

/* ===== Dashboard cards ===== */
.cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
.scard { background: #fff; border: 1px solid #d1d5db; border-left: 4px solid #1e3a5f; border-radius: 6px; padding: 14px; }
.scard .lbl { font-size: 12px; color: #6b7280; margin-bottom: 4px; }
.scard .val { font-size: 20px; font-weight: 700; color: #1e3a5f; font-variant-numeric: tabular-nums; }
.scard.green { border-left-color: #15803d; } .scard.green .val { color: #15803d; }
.scard.red { border-left-color: #b91c1c; } .scard.red .val { color: #b91c1c; }
.scard.amber { border-left-color: #b45309; } .scard.amber .val { color: #b45309; }

/* ===== Misc ===== */
.badge { display: inline-block; padding: 1px 7px; border-radius: 9px; font-size: 11px; font-weight: 600; }
.badge.pt { background: #dcfce7; color: #15803d; }
.badge.pc { background: #fee2e2; color: #b91c1c; }
.badge.pu { background: #fef3c7; color: #b45309; }
.badge.hu { background: #dbeafe; color: #1d4ed8; }
.badge.tm { background: #f3e8ff; color: #7e22ce; }
.badge.ck { background: #e0f2fe; color: #0369a1; }
.attlist { font-size: 12px; margin-top: 4px; }
.attlist .att { display: inline-flex; align-items: center; gap: 4px; background: #eef2f7; border: 1px solid #d1d5db; border-radius: 4px; padding: 2px 7px; margin: 2px 4px 2px 0; }
.attlist img.thumb { height: 34px; border-radius: 3px; vertical-align: middle; cursor: pointer; }
.attlist .rm { color: #b91c1c; cursor: pointer; font-weight: 700; padding: 0 2px; }
.msg { padding: 9px 12px; border-radius: 4px; font-size: 13px; margin: 8px 0; display: none; }
.msg.ok { display: block; background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
.msg.err { display: block; background: #fee2e2; color: #7f1d1d; border: 1px solid #fca5a5; }
.note { font-size: 12.5px; color: #6b7280; line-height: 1.5; }
.warnbox { background: #fef2f2; border: 1px solid #fca5a5; color: #7f1d1d; border-radius: 4px; padding: 8px 10px; font-size: 12.5px; margin-top: 6px; line-height: 1.5; }
.okbox { background: #f0fdf4; border: 1px solid #86efac; color: #14532d; border-radius: 4px; padding: 8px 10px; font-size: 12.5px; margin-top: 6px; line-height: 1.5; }
td.over { color: #b91c1c; font-weight: 700; }
hr.sep { border: none; border-top: 1px dashed #cbd5e1; margin: 14px 0; }

/* ===== Modal ===== */
#modalBack { display: none; position: fixed; inset: 0; background: rgba(15,23,42,.45); z-index: 50; align-items: center; justify-content: center; }
#modalBack.show { display: flex; }
#modalBox { background: #fff; border-radius: 8px; padding: 20px; max-width: 460px; width: 92%; }
#modalBox h3 { font-size: 15px; color: #1e3a5f; margin-bottom: 8px; }
#modalBox p { font-size: 13px; color: #4b5563; margin-bottom: 14px; line-height: 1.5; }
#imgView { display: none; position: fixed; inset: 0; background: rgba(15,23,42,.8); z-index: 60; align-items: center; justify-content: center; cursor: zoom-out; }
#imgView.show { display: flex; }
#imgView img { max-width: 92%; max-height: 92%; background: #fff; }

/* ===== PRINT ===== */
#printArea { display: none; }
@media print {
  body * { visibility: hidden; }
  #printArea, #printArea * { visibility: visible; }
  #printArea { display: block !important; position: absolute; top: 0; left: 0; width: 100%; }
  #sidebar, #main { display: none; }
}
/* print document styles */
.pdoc { font-family: "Times New Roman", Times, serif; font-size: 13px; color: #000; width: 100%; }
.pdoc .phead { display: flex; justify-content: space-between; align-items: flex-start; }
.pdoc .porgwrap { display: flex; align-items: center; gap: 10px; }
.pdoc .plogo { width: 58px; height: 58px; flex-shrink: 0; }
.pdoc .porg { font-size: 12px; font-weight: 700; line-height: 1.45; }
.pdoc .porg .u { text-decoration: underline; }
.pdoc .pmau { font-size: 10.5px; font-style: italic; text-align: center; max-width: 230px; border: 1px solid #000; padding: 3px 6px; }
.pdoc h1.ptitle { text-align: center; font-size: 19px; margin: 12px 0 2px; letter-spacing: .5px; }
.pdoc .pnumline { text-align: right; font-size: 13px; margin: 4px 0 8px; line-height: 1.6; }
.pdoc .pinfo { margin: 3px 0; }
.pdoc table.ptbl { width: 100%; border-collapse: collapse; margin: 8px 0; }
.pdoc table.ptbl th, .pdoc table.ptbl td { border: 1px solid #000; padding: 5px 6px; font-size: 13px; vertical-align: top; }
.pdoc table.ptbl th { text-align: center; font-weight: 700; }
.pdoc table.ptbl td.num { text-align: right; white-space: nowrap; }
.pdoc .psig { display: flex; justify-content: space-between; text-align: center; margin-top: 16px; }
.pdoc .psig > div { flex: 1; }
.pdoc .psig .role { font-weight: 700; font-size: 13px; }
.pdoc .psig .name { margin-top: 58px; font-weight: 700; }
.pdoc .psig .fn { font-size: 12px; font-style: italic; }
.pdoc .pfoot { font-size: 11px; font-style: italic; margin-top: 14px; }
.pdoc tr.sum td { font-weight: 700; }
.pdoc .center { text-align: center; }
.pdoc .b { font-weight: 700; }
.pdoc .i { font-style: italic; }
.pdoc .pattach { page-break-before: always; text-align: center; }
.pdoc .pattach img { max-width: 100%; max-height: 180mm; }
</style>
<style id="pageRule">@page { size: A4 portrait; margin: 12mm; }</style>

  if (!DB || typeof DB !== 'object') DB = defaultDB();
  // đảm bảo đủ nhánh khi nâng cấp phiên bản
  const d = defaultDB();
  for (const k in d) if (DB[k] === undefined) DB[k] = d[k];
  for (const k in d.settings) if (DB.settings[k] === undefined) DB.settings[k] = d.settings[k];
  migrateData();
}
function migrateData() {
  // bổ sung trường mới cho dữ liệu cũ
  (DB.thamVieng || []).forEach(r => {
    if (r.mungCuoi === undefined) r.mungCuoi = 0;
    if (r.thaiSan === undefined) r.thaiSan = 0;
    if (!r.nam) {
      const m = /(\d{1,2})\/(\d{1,2})\/(\d{4})/.exec(r.ghiChu || '');
      r.nam = m ? Number(m[3]) : new Date().getFullYear();
    }
  });
  (DB.phieu || []).forEach(p => { if (p.boPhan === undefined) p.boPhan = ''; });
}
function saveDB() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(DB)); }

}

/* ================================================================
   TIỆN ÍCH
   ================================================================ */
function $(id) { return document.getElementById(id); }
function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function fmt(n) { n = Number(n) || 0; return n.toLocaleString('vi-VN'); }
function parseMoney(s) { return Number(String(s == null ? '' : s).replace(/[^\d-]/g, '')) || 0; }
function todayISO() { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
function fmtDate(iso) { if (!iso) return ''; const p = iso.split('-'); return p.length === 3 ? p[2] + '/' + p[1] + '/' + p[0] : iso; }
function yearOf(iso) { return Number((iso || '').slice(0, 4)) || 0; }
function monthOf(iso) { return Number((iso || '').slice(5, 7)) || 0; }
function quarterOf(iso) { return Math.ceil(monthOf(iso) / 3) || 0; }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function moneyInput(el) {
  el.addEventListener('input', function () {
    const v = parseMoney(el.value);
    el.value = v ? fmt(v) : '';
    if (el.dataset.words) { const w = $(el.dataset.words); if (w) w.value = soThanhChu(v); }
  });
}
function dmOptions(dm, sel) {
  const list = dm === 'THU' ? DM_THU : dm === 'CHI' ? DM_CHI : DM_THU.concat(DM_CHI);
  let h = '<option value="">— Chọn mục / mã số —</option>';
  for (const it of list) h += '<option value="' + it.ma + '"' + (sel === it.ma ? ' selected' : '') + '>' + it.ma + ' — ' + esc(it.ten) + '</option>';
  return h;
}
function tenMuc(ma) { const it = DM_THU.concat(DM_CHI).find(x => x.ma === ma); return it ? it.ten : ''; }

/* ---------- Hạn mức thăm hỏi đoàn viên ---------- */
function normName(s) { return String(s || '').trim().toLowerCase().replace(/\s+/g, ' '); }
function tongThamHoiRow(r) { return (Number(r.thamBenh) || 0) + (Number(r.thamVieng) || 0) + (Number(r.mungCuoi) || 0) + (Number(r.thaiSan) || 0); }
function tongThamHoi(hoTen, nam) {
  const n = normName(hoTen);
  if (!n) return 0;
  return DB.thamVieng.filter(r => normName(r.hoTen) === n && Number(r.nam) === Number(nam)).reduce((s, r) => s + tongThamHoiRow(r), 0);
}
function thamHoiStats(nam) {
  // gộp theo tên (không phân biệt hoa thường) trong 1 năm
  const map = {};
  DB.thamVieng.forEach(r => {
    if (Number(r.nam) !== Number(nam)) return;
    const n = normName(r.hoTen);
    if (!n) return;
    if (!map[n]) map[n] = { hoTen: r.hoTen, boPhan: r.boPhan || '', thamBenh: 0, thamVieng: 0, mungCuoi: 0, thaiSan: 0, tong: 0 };
    TH_LOAI.forEach(t => { map[n][t.k] += Number(r[t.k]) || 0; });
    map[n].tong += tongThamHoiRow(r);
    if (!map[n].boPhan && r.boPhan) map[n].boPhan = r.boPhan;
  });
  return Object.values(map).sort((a, b) => b.tong - a.tong);
}

/* ---------- Đọc số thành chữ tiếng Việt ---------- */
const CHU_SO = ['không', 'một', 'hai', 'ba', 'bốn', 'năm', 'sáu', 'bảy', 'tám', 'chín'];
function doc3(n, full) {
  const t = Math.floor(n / 100), c = Math.floor((n % 100) / 10), d = n % 10, p = [];
  if (t > 0 || full) { p.push(CHU_SO[t], 'trăm'); }
  if (c > 1) {
    p.push(CHU_SO[c], 'mươi');
    if (d === 1) p.push('mốt'); else if (d === 4) p.push('tư'); else if (d === 5) p.push('lăm'); else if (d > 0) p.push(CHU_SO[d]);
  } else if (c === 1) {
    p.push('mười');
    if (d === 5) p.push('lăm'); else if (d > 0) p.push(CHU_SO[d]);
  } else if (d > 0) {
    if (t > 0 || full) p.push('linh');
    p.push(CHU_SO[d]);
  }
  return p.join(' ');
}
function soThanhChu(n) {
  n = Math.floor(Math.abs(Number(n) || 0));
  if (n === 0) return '';
  const donVi = ['', ' nghìn', ' triệu', ' tỷ', ' nghìn tỷ', ' triệu tỷ'];
  const groups = [];
  while (n > 0) { groups.push(n % 1000); n = Math.floor(n / 1000); }
  let s = '', started = false;
  for (let i = groups.length - 1; i >= 0; i--) {
    const g = groups[i];
    if (g > 0) {
      s += (s ? ' ' : '') + doc3(g, started && g < 100) + donVi[i];
      started = true;
    }
  }
  s = s.trim();
  s = s.charAt(0).toUpperCase() + s.slice(1) + ' đồng chẵn./.';
  return s;
}

/* ---------- Đính kèm file ---------- */
function handleFiles(input, arr, listElId) {
  const files = Array.from(input.files || []);
  input.value = '';
  let pending = files.length;
  if (!pending) return;
  files.forEach(f => {
    if (f.type.indexOf('image/') === 0) {
      const img = new Image();
      const url = URL.createObjectURL(f);
      img.onload = function () {
        const MAX = 1400;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) { const r = Math.min(MAX / w, MAX / h); w = Math.round(w * r); h = Math.round(h * r); }
        const cv = document.createElement('canvas'); cv.width = w; cv.height = h;
        cv.getContext('2d').drawImage(img, 0, 0, w, h);
        arr.push({ name: f.name, type: 'image/jpeg', data: cv.toDataURL('image/jpeg', 0.78) });
        URL.revokeObjectURL(url);
        if (--pending === 0) renderAttList(arr, listElId);
      };
      img.onerror = function () { URL.revokeObjectURL(url); if (--pending === 0) renderAttList(arr, listElId); };
      img.src = url;
    } else {
      if (f.size > 800 * 1024 && !confirm('File "' + f.name + '" khá lớn (' + Math.round(f.size / 1024) + ' KB). Lưu file lớn có thể làm đầy bộ nhớ trình duyệt. Vẫn đính kèm?')) {
        if (--pending === 0) renderAttList(arr, listElId);
        return;
      }
      const rd = new FileReader();
      rd.onload = function () { arr.push({ name: f.name, type: f.type || 'application/octet-stream', data: rd.result }); if (--pending === 0) renderAttList(arr, listElId); };
      rd.readAsDataURL(f);
    }
  });
}
function renderAttList(arr, elId) {
  const el = $(elId); if (!el) return;
  el.innerHTML = arr.map((f, i) =>
    '<span class="att">' +
    (f.type.indexOf('image/') === 0 ? '<img class="thumb" src="' + f.data + '" onclick="viewImg(this.src)" alt="">' : '📄') +
    ' ' + esc(f.name) +
    ' <a href="' + f.data + '" download="' + esc(f.name) + '" title="Tải về">⬇</a>' +
    ' <span class="rm" title="Gỡ" onclick="rmAtt(\'' + elId + '\',' + i + ')">✕</span></span>'
  ).join('') || '<span class="note">Chưa có file đính kèm.</span>';
}
const ATT_BUF = {}; // buffer đính kèm cho từng form
function rmAtt(elId, i) { const arr = ATT_BUF[elId]; if (arr) { arr.splice(i, 1); renderAttList(arr, elId); } }
function viewImg(src) { $('imgViewImg').src = src; $('imgView').classList.add('show'); }

/* ---------- Modal ---------- */
function showModal(title, body, buttons) {
  const box = $('modalBox');
  box.innerHTML = '<h3>' + esc(title) + '</h3><p>' + body + '</p><div class="btnrow" id="modalBtns"></div>';
  const bt = $('modalBtns');

/* ---------- Số phiếu tự sinh ---------- */
function nextSo(loai, nam) {
  nam = nam || new Date().getFullYear();
  const re = new RegExp('^' + loai + '\\s*(\\d+)\\s*/\\s*' + nam + '$', 'i');
  let max = 0;
  const list = loai === 'UNC' ? DB.unc : DB.phieu.filter(p => p.loai === loai);
  list.forEach(p => { const m = re.exec((p.so || '').trim()); if (m) max = Math.max(max, Number(m[1])); });
  return loai + ' ' + String(max + 1).padStart(2, '0') + '/' + nam;
}

  if (loai === 'PC' && g('maso').value === '33') {

      const daChi = tongThamHoi(tenTH, yearOf(ngay));
      if (daChi + soTien > HAN_MUC_TH) {
        if (!confirm('CẢNH BÁO VƯỢT HẠN MỨC THĂM HỎI!\n\nĐoàn viên: ' + tenTH + '\nĐã chi trong năm ' + yearOf(ngay) + ': ' + fmt(daChi) + ' đ\nPhiếu này: ' + fmt(soTien) + ' đ\nTổng sau phiếu: ' + fmt(daChi + soTien) + ' đ\n\nVƯỢT hạn mức ' + fmt(HAN_MUC_TH) + ' đ/đoàn viên/năm.\n\nBấm OK để VẪN LƯU phiếu, Cancel để hủy.')) return;
      }
    }
  }
  const p = {
    id: editingPhieu[loai] || uid(),
    loai: loai,
    so: g('so').value.trim(),
    ngay: ngay,
    nguoi: g('nguoi').value.trim(),
    boPhan: g('bophan').value.trim(),
    diaChi: g('diachi').value.trim(),
    dienGiai: g('diengiai').value.trim(),
    soTien: soTien,
    bangChu: g('bangchu').value.trim() || soThanhChu(soTien),
    maSo: g('maso').value,
    taiKhoan: g('taikhoan').value.trim() || 'Công đoàn',
    hinhThuc: g('hinhthuc').value,
    no: g('no').value.trim(),
    co: g('co').value.trim(),
    puRef: loai === 'HU' ? $('f_HU_puRef').value : '',
    files: ATT_BUF['att_' + loai].slice(),
    createdAt: new Date().toISOString()
  };
  const idx = DB.phieu.findIndex(x => x.id === p.id);
  if (idx >= 0) { p.createdAt = DB.phieu[idx].createdAt; DB.phieu[idx] = p; }
  else {
    if (DB.phieu.some(x => x.loai === loai && x.so === p.so)) p.so = nextSo(loai, yearOf(ngay) || undefined);
    DB.phieu.push(p);
  }
  // Phiếu chi mã 33 → thêm vào danh sách thăm viếng
  if (loai === 'PC' && p.maSo === '33' && $('pc33chk').checked && idx < 0) {
    const lv = $('pc33loai').value;
    const row = {
      hoTen: $('pc33ten').value.trim() || p.nguoi,
      boPhan: $('pc33bophan').value.trim() || p.boPhan,
      nam: yearOf(p.ngay),
      thamBenh: 0, thamVieng: 0, mungCuoi: 0, thaiSan: 0,
      ghiChu: p.so + ' — ' + fmtDate(p.ngay)
    };
    row[lv] = p.soTien;
    DB.thamVieng.push(row);
  }
  saveDB();
  resetPhieuForm(loai);
  renderAll();
  const m = $('fmsg_' + loai);
  m.innerHTML = '<span style="color:#15803d;font-weight:600">Đã lưu ' + esc(p.so) + ' ✓</span> ' +
    '<button class="mini" onclick="printPhieu(\'' + p.id + '\')">🖨 In phiếu vừa lưu</button>' +
    (loai === 'PC' && p.hinhThuc === 'CK' ? ' <button class="mini" onclick="taoUNCTuPC(\'' + p.id + '\')">➜ Tạo Ủy nhiệm chi</button>' : '');
  setTimeout(() => { if (m) m.innerHTML = ''; }, 15000);
}

/* ---------- Danh sách phiếu: lọc & sắp xếp ---------- */
const FILTERS = {};
const LIST_LOAI = { pt: ['PT'], pc: ['PC'], tu: ['PU', 'HU'] };
const LIST_STATE = {};
function listState(k) {
  if (!LIST_STATE[k]) LIST_STATE[k] = { q: '', nam: '', ma: '', ht: '', sortKey: 'ngay', sortDir: -1 };
  return LIST_STATE[k];
}
function setLF(k, field, v) { listState(k)[field] = v; refreshPhieuTable(k); }
function sortList(k, key) {
  const st = listState(k);
  if (st.sortKey === key) st.sortDir = -st.sortDir;
  else { st.sortKey = key; st.sortDir = (key === 'ngay' || key === 'soTien') ? -1 : 1; }
  refreshPhieuTable(k);
}
function clearLF(k) { LIST_STATE[k] = null; renderAll(); }
function soVal(so) {
  const m = /(\d+)\s*\/\s*(\d{2,4})/.exec(so || '');
  return m ? Number(m[2]) * 100000 + Number(m[1]) : 0;
}
function refreshPhieuTable(k) {
  const el = $('ptbl_' + k);
  if (el) el.innerHTML = phieuTableHTML(LIST_LOAI[k], k);
}
function phieuListHTML(loaiArr, modKey) {
  const st = listState(modKey);
  const dmKind = modKey === 'pt' ? 'THU' : modKey === 'pc' ? 'CHI' : 'ALL';
  const dmList = dmKind === 'THU' ? DM_THU : dmKind === 'CHI' ? DM_CHI : DM_THU.concat(DM_CHI);
  let h = '<div class="searchrow">' +
    '<input type="text" placeholder="Tìm theo số phiếu, ngày, tên, diễn giải…" value="' + esc(st.q) + '" oninput="setLF(\'' + modKey + '\',\'q\',this.value)">' +
    '<label style="font-size:12.5px">Năm: <select onchange="setLF(\'' + modKey + '\',\'nam\',this.value)"><option value="">Tất cả</option>' +
      namesOfYears().map(y => '<option value="' + y + '"' + (String(y) === String(st.nam) ? ' selected' : '') + '>' + y + '</option>').join('') + '</select></label>' +
    '<label style="font-size:12.5px">Mã số: <select onchange="setLF(\'' + modKey + '\',\'ma\',this.value)"><option value="">Tất cả</option>' +
      dmList.map(m => '<option value="' + m.ma + '"' + (m.ma === st.ma ? ' selected' : '') + '>' + m.ma + ' — ' + esc(m.ten.slice(0, 28)) + '</option>').join('') + '</select></label>' +
    '<label style="font-size:12.5px">Hình thức: <select onchange="setLF(\'' + modKey + '\',\'ht\',this.value)"><option value="">Tất cả</option>' +
      '<option value="TM"' + (st.ht === 'TM' ? ' selected' : '') + '>Tiền mặt</option><option value="CK"' + (st.ht === 'CK' ? ' selected' : '') + '>Chuyển khoản</option></select></label>' +
    '<button class="mini" onclick="clearLF(\'' + modKey + '\')">✕ Xóa lọc</button>' +
    '</div><div id="ptbl_' + modKey + '">' + phieuTableHTML(loaiArr, modKey) + '</div>';
  return h;
}
function phieuTableHTML(loaiArr, modKey) {
  const st = listState(modKey);
  const q = st.q.trim().toLowerCase();
  let list = DB.phieu.filter(p => loaiArr.indexOf(p.loai) >= 0);
  if (st.nam) list = list.filter(p => String(yearOf(p.ngay)) === String(st.nam));
  if (st.ma) list = list.filter(p => p.maSo === st.ma);
  if (st.ht) list = list.filter(p => p.hinhThuc === st.ht);
  if (q) list = list.filter(p =>
    (p.so || '').toLowerCase().indexOf(q) >= 0 ||
    (p.maSo || '').indexOf(q) >= 0 ||
    fmtDate(p.ngay).indexOf(q) >= 0 ||
    (p.nguoi || '').toLowerCase().indexOf(q) >= 0 ||
    (p.boPhan || '').toLowerCase().indexOf(q) >= 0 ||
    (p.dienGiai || '').toLowerCase().indexOf(q) >= 0);
  const dir = st.sortDir;
  list.sort((a, b) => {
    let r = 0;
    switch (st.sortKey) {
      case 'so': r = soVal(a.so) - soVal(b.so) || String(a.so).localeCompare(String(b.so), 'vi'); break;
      case 'loai': r = String(a.loai).localeCompare(b.loai); break;
      case 'nguoi': r = String(a.nguoi || '').localeCompare(String(b.nguoi || ''), 'vi'); break;
      case 'maSo': r = String(a.maSo || '').localeCompare(String(b.maSo || '')); break;
      case 'soTien': r = (a.soTien || 0) - (b.soTien || 0); break;
      case 'hinhThuc': r = String(a.hinhThuc).localeCompare(b.hinhThuc); break;
      default: r = String(a.ngay || '').localeCompare(String(b.ngay || '')) || String(a.createdAt || '').localeCompare(String(b.createdAt || ''));
    }
    return r * dir || soVal(a.so) - soVal(b.so);
  });
  const tong = list.reduce((s, p) => s + (p.soTien || 0), 0);
  function th(key, label, num) {
    const on = st.sortKey === key;
    return '<th class="sortable' + (on ? ' sorted' : '') + (num ? ' num' : '') + '" onclick="sortList(\'' + modKey + '\',\'' + key + '\')" title="Bấm để sắp xếp">' + label + (on ? (st.sortDir > 0 ? ' ▲' : ' ▼') : '') + '</th>';
  }
  let h = '<p class="note" style="margin-bottom:6px">Hiển thị <b>' + list.length + '</b> phiếu · Tổng tiền: <b>' + fmt(tong) + ' đ</b> · Bấm vào tiêu đề cột để sắp xếp.</p>' +
    '<div class="tblwrap"><table class="tbl"><tr>' +
    th('so', 'Số phiếu') + th('ngay', 'Ngày') + th('loai', 'Loại') +
    th('nguoi', modKey === 'pt' ? 'Người nộp' : 'Người nhận') +
    '<th>Diễn giải</th>' + th('maSo', 'Mã số') + th('soTien', 'Số tiền', true) + th('hinhThuc', 'HT') +
    '<th>Kèm</th><th>Thao tác</th></tr>';
  for (const p of list) {
    h += '<tr><td><b>' + esc(p.so) + '</b></td><td>' + fmtDate(p.ngay) + '</td>' +
      '<td><span class="badge ' + p.loai.toLowerCase() + '">' + p.loai + '</span></td>' +
      '<td>' + esc(p.nguoi) + (p.boPhan ? '<div class="hint">' + esc(p.boPhan) + '</div>' : '') + '</td>' +
      '<td>' + esc((p.dienGiai || '').slice(0, 70)) + ((p.dienGiai || '').length > 70 ? '…' : '') +
      (p.loai === 'HU' && p.puRef ? '<div class="hint">↩ hoàn cho ' + esc((DB.phieu.find(x => x.id === p.puRef) || {}).so || '?') + '</div>' : '') + '</td>' +
      '<td>' + esc(p.maSo) + '</td><td class="num">' + fmt(p.soTien) + '</td>' +
      '<td><span class="badge ' + (p.hinhThuc === 'TM' ? 'tm' : 'ck') + '">' + (p.hinhThuc === 'TM' ? 'TM' : 'CK') + '</span></td>' +
      '<td>' + ((p.files || []).length ? '📎' + p.files.length : '') + '</td>' +
      '<td><button class="mini" onclick="printPhieu(\'' + p.id + '\')">🖨 In</button>' +
      '<button class="mini" onclick="editPhieu(\'' + p.id + '\')">✎ Sửa</button>' +
      (p.loai === 'PC' && p.hinhThuc === 'CK' ? '<button class="mini" onclick="taoUNCTuPC(\'' + p.id + '\')">UNC</button>' : '') +
      '<button class="mini del" onclick="delPhieu(\'' + p.id + '\')">✕</button></td></tr>';
  }
  if (!list.length) h += '<tr><td colspan="10" class="note" style="text-align:center;padding:14px">Không có phiếu nào khớp bộ lọc.</td></tr>';
  return h + '</table></div>';
}

   SỔ QUỸ TIỀN MẶT & SỔ TK NGÂN HÀNG
   ================================================================ */
function getSoDu(nam) {
  const sd = DB.settings.soDu[nam] || { TM: 0, NH: 0 };
  return { TM: Number(sd.TM) || 0, NH: Number(sd.NH) || 0 };
}
function ledgerEntries(kind, nam) {
  // kind: 'TM' | 'CK'  — PT/HU: tiền vào; PC/PU: tiền ra
  return DB.phieu
    .filter(p => p.hinhThuc === kind && yearOf(p.ngay) === nam)
    .sort((a, b) => (a.ngay || '').localeCompare(b.ngay || '') || (a.createdAt || '').localeCompare(b.createdAt || ''));
}
function balanceAt(kind, nam, uptoISO) {
  // số dư từ đầu năm `nam` đến hết ngày uptoISO (bao gồm)
  const open = getSoDu(nam)[kind === 'TM' ? 'TM' : 'NH'];
  let bal = open;
  for (const p of ledgerEntries(kind, nam)) {
    if (uptoISO && p.ngay > uptoISO) continue;
    bal += (p.loai === 'PT' || p.loai === 'HU') ? p.soTien : -p.soTien;
  }
  return bal;
}
const soState = { namTM: null, namNH: null };
function ledgerTableHTML(kind, nam, filterKey) {
  const f = (FILTERS[filterKey] || '').toLowerCase();
  const open = getSoDu(nam)[kind === 'TM' ? 'TM' : 'NH'];
  const entries = ledgerEntries(kind, nam);
  const colThu = kind === 'TM' ? 'Thu (VNĐ)' : 'Gửi vào (VNĐ)';
  const colChi = kind === 'TM' ? 'Chi (VNĐ)' : 'Rút ra (VNĐ)';
  const colTon = kind === 'TM' ? 'Tồn quỹ (VNĐ)' : 'Còn lại (VNĐ)';
  let bal = open, tThu = 0, tChi = 0;
  let rows = '<tr class="sum"><td colspan="5">Số dư đầu kỳ</td><td class="num">' + fmt(open) + '</td><td class="num"></td><td class="num">' + fmt(open) + '</td></tr>';
  for (const p of entries) {
    const vao = (p.loai === 'PT' || p.loai === 'HU') ? p.soTien : 0;
    const ra = vao ? 0 : p.soTien;
    bal += vao - ra; tThu += vao; tChi += ra;
    const match = !f || (p.so || '').toLowerCase().indexOf(f) >= 0 || fmtDate(p.ngay).indexOf(f) >= 0 || (p.maSo || '').indexOf(f) >= 0 || (p.dienGiai || '').toLowerCase().indexOf(f) >= 0;
    if (!match) continue;
    rows += '<tr><td>' + fmtDate(p.ngay) + '</td><td>' + (vao ? '<b>' + esc(p.so) + '</b>' : '') + '</td><td>' + (ra ? '<b>' + esc(p.so) + '</b>' : '') + '</td><td>' + esc(p.maSo) + '</td><td>' + esc(p.dienGiai) + '</td>' +
      '<td class="num">' + (vao ? fmt(vao) : '') + '</td><td class="num">' + (ra ? fmt(ra) : '') + '</td><td class="num">' + fmt(bal) + '</td></tr>';
  }
  rows += '<tr class="sum"><td colspan="5">Cộng phát sinh & tồn cuối kỳ</td><td class="num">' + fmt(tThu) + '</td><td class="num">' + fmt(tChi) + '</td><td class="num">' + fmt(open + tThu - tChi) + '</td></tr>';
  return '<div class="tblwrap"><table class="tbl"><tr><th>Ngày</th><th>Số phiếu Thu</th><th>Số phiếu Chi</th><th>Mã số</th><th>Diễn giải</th><th class="num">' + colThu + '</th><th class="num">' + colChi + '</th><th class="num">' + colTon + '</th></tr>' + rows + '</table></div>';
}
function soModuleHTML(kind) {
  const isTM = kind === 'TM';
  const nam = isTM ? soState.namTM : soState.namNH;
  const key = isTM ? 'soquy' : 'sonh';
  const years = namesOfYears();
  return '<h2 class="mtitle">' + (isTM ? 'Sổ quỹ tiền mặt' : 'Sổ tài khoản ngân hàng') + '</h2>' +
    '<div class="card"><div class="searchrow">' +
    '<label style="font-size:13px">Năm: <select onchange="soState.' + (isTM ? 'namTM' : 'namNH') + '=Number(this.value);renderAll()">' + years.map(y => '<option value="' + y + '"' + (y === nam ? ' selected' : '') + '>' + y + '</option>').join('') + '</select></label>' +
    '<label style="font-size:13px">Số dư đầu kỳ: <input type="text" style="width:140px;text-align:right" value="' + fmt(getSoDu(nam)[isTM ? 'TM' : 'NH']) + '" onchange="setSoDu(' + nam + ',\'' + (isTM ? 'TM' : 'NH') + '\',this.value)"></label>' +
    '<input type="text" placeholder="Lọc theo số phiếu, ngày, mã số…" value="' + esc(FILTERS[key] || '') + '" oninput="FILTERS[\'' + key + '\']=this.value;renderAll()">' +
    '<button class="btn sec" onclick="printSo(\'' + kind + '\',' + nam + ')">🖨 In sổ</button>' +
    '</div><div id="sotbl_' + kind + '">' + ledgerTableHTML(kind, nam, key) + '</div></div>';
}
function setSoDu(nam, kind, val) {
  if (!DB.settings.soDu[nam]) DB.settings.soDu[nam] = { TM: 0, NH: 0 };
  DB.settings.soDu[nam][kind] = parseMoney(val);
  saveDB(); renderAll();
}
function namesOfYears() {
  const cur = new Date().getFullYear();
  const set = new Set([cur, cur - 1, cur + 1]);
  DB.phieu.forEach(p => { const y = yearOf(p.ngay); if (y) set.add(y); });
  Object.keys(DB.settings.soDu || {}).forEach(y => set.add(Number(y)));
  return Array.from(set).filter(Boolean).sort();
}
function renderModSoQuy() { if (soState.namTM == null) soState.namTM = new Date().getFullYear(); $('mod-soquy').innerHTML = soModuleHTML('TM'); }
function renderModSoNH() { if (soState.namNH == null) soState.namNH = new Date().getFullYear(); $('mod-sonh').innerHTML = soModuleHTML('CK'); }
function printSo(kind, nam) {
  const isTM = kind === 'TM';
  const html = '<div class="pdoc">' + orgHeaderHTML('') +
    '<h1 class="ptitle">' + (isTM ? 'SỔ QUỸ TIỀN MẶT' : 'SỔ TÀI KHOẢN NGÂN HÀNG') + '</h1>' +
    '<div class="center b" style="margin-bottom:8px">Năm ' + nam + '</div>' +

  printDoc(html, 'A4 landscape');
}

/* ================================================================
   BÁO CÁO QUYẾT TOÁN QUÝ (B07/TLĐ)
   ================================================================ */
const bcState = { quy: Math.ceil((new Date().getMonth() + 1) / 3), nam: new Date().getFullYear() };
function quarterRange(quy, nam) {
  const m1 = (quy - 1) * 3 + 1, m2 = quy * 3;
  const from = nam + '-' + String(m1).padStart(2, '0') + '-01';
  const lastDay = new Date(nam, m2, 0).getDate();
  const to = nam + '-' + String(m2).padStart(2, '0') + '-' + String(lastDay).padStart(2, '0');
  return { from: from, to: to };
}
function sumMa(loai, ma, fromISO, toISO) {
  return DB.phieu.filter(p => p.loai === loai && p.maSo === ma && p.ngay >= fromISO && p.ngay <= toISO).reduce((s, p) => s + p.soTien, 0);
}
function baoCaoData(quy, nam) {
  const r = quarterRange(quy, nam);
  const y1 = nam + '-01-01';
  const dayBefore = new Date(new Date(r.from).getTime() - 86400000);
  const beforeISO = dayBefore.getFullYear() + '-' + String(dayBefore.getMonth() + 1).padStart(2, '0') + '-' + String(dayBefore.getDate()).padStart(2, '0');
  const d = { thu: {}, chi: {}, thuLK: {}, chiLK: {} };
  DM_THU.forEach(m => { d.thu[m.ma] = sumMa('PT', m.ma, r.from, r.to); d.thuLK[m.ma] = sumMa('PT', m.ma, y1, r.to); });
  DM_CHI.forEach(m => { d.chi[m.ma] = sumMa('PC', m.ma, r.from, r.to); d.chiLK[m.ma] = sumMa('PC', m.ma, y1, r.to); });
  // Mã 26 — số dư kỳ trước chuyển sang (không lấy theo phiếu mà theo số dư sổ)
  const sd = getSoDu(nam);
  d.duTM_ky = quy === 1 ? sd.TM : balanceAt('TM', nam, beforeISO);
  d.duNH_ky = quy === 1 ? sd.NH : balanceAt('CK', nam, beforeISO);
  d.duTM_lk = sd.TM; d.duNH_lk = sd.NH;
  d.congThu_ky = d.thu['22'] + d.thu['23'] + d.thu['24'];
  d.congThu_lk = d.thuLK['22'] + d.thuLK['23'] + d.thuLK['24'];
  d.duKyTruoc_ky = d.duTM_ky + d.duNH_ky;
  d.duKyTruoc_lk = d.duTM_lk + d.duNH_lk;
  d.tongThu_ky = d.congThu_ky + d.thu['25'] + d.duKyTruoc_ky;
  d.tongThu_lk = d.congThu_lk + d.thuLK['25'] + d.duKyTruoc_lk;
  const chiMuc = ['27', '28', '29', '31', '33', '35'];
  d.congChi_ky = chiMuc.reduce((s, m) => s + d.chi[m], 0);
  d.congChi_lk = chiMuc.reduce((s, m) => s + d.chiLK[m], 0);
  d.tongChi_ky = d.congChi_ky + d.chi['36'] + d.chi['37'] + d.chi['49'];
  d.tongChi_lk = d.congChi_lk + d.chiLK['36'] + d.chiLK['37'] + d.chiLK['49'];
  d.duCuoiKy = balanceAt('TM', nam, r.to) + balanceAt('CK', nam, r.to);
  d.kpPhaiNop_ky = Math.round(d.thu['22'] * 0.29); d.kpPhaiNop_lk = Math.round(d.thuLK['22'] * 0.29);
  d.dpPhaiNop_ky = Math.round(d.thu['23'] * 0.40); d.dpPhaiNop_lk = Math.round(d.thuLK['23'] * 0.40);
  return d;
}
function baoCaoTableHTML(quy, nam, forPrint) {
  const d = baoCaoData(quy, nam);
  const cls = forPrint ? 'ptbl' : 'tbl';
  function row(muc, noiDung, ma, ky, lk, bold) {
    return '<tr' + (bold ? ' class="sum"' : '') + '><td class="center">' + muc + '</td><td' + (bold ? ' class="b"' : '') + '>' + noiDung + '</td><td class="center">' + ma + '</td>' +
      '<td class="num' + (bold ? ' b' : '') + '">' + (ky === '' ? '' : fmt(ky)) + '</td><td class="num' + (bold ? ' b' : '') + '">' + (lk === '' ? '' : fmt(lk)) + '</td><td></td></tr>';
  }
  let h = '<div class="tblwrap"><table class="' + cls + '">' +
    '<tr><th style="width:6%">Mục</th><th>Nội dung</th><th style="width:8%">Mã số</th><th style="width:15%" class="num">Quyết toán kỳ này</th><th style="width:16%" class="num">Lũy kế từ đầu năm đến nay</th><th style="width:12%" class="num">Cấp trên duyệt</th></tr>' +
    '<tr><td class="center">A</td><td class="center">B</td><td class="center">C</td><td class="center">1</td><td class="center">2</td><td class="center">3</td></tr>' +
    row('I', 'PHẦN THU', '', '', '', true) +
    row('1', 'Thu kinh phí Công đoàn', '22', d.thu['22'], d.thuLK['22']) +
    row('2', 'Thu đoàn phí công đoàn', '23', d.thu['23'], d.thuLK['23']) +
    row('3', 'Các khoản thu khác', '24', d.thu['24'], d.thuLK['24']) +
    row('', 'Cộng thu NSCĐ', '', d.congThu_ky, d.congThu_lk, true) +

/* ---------- Xuất / Nhập file ---------- */
function exportData() {
  const d = new Date();
  const name = 'congdoan-data-' + d.getFullYear() + String(d.getMonth() + 1).padStart(2, '0') + String(d.getDate()).padStart(2, '0') + '-' + String(d.getHours()).padStart(2, '0') + String(d.getMinutes()).padStart(2, '0') + '.json';
  const blob = new Blob([JSON.stringify(DB, null, 1)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}
function importFromFile(input) {
  const f = input.files[0];
  input.value = '';
  if (!f) return;
  const rd = new FileReader();
  rd.onload = function () {
    let inc;
    try { inc = JSON.parse(rd.result); } catch (e) { alert('File không đúng định dạng JSON: ' + e.message); return; }
    if (!inc || !Array.isArray(inc.phieu)) { alert('File không phải dữ liệu của ứng dụng này.'); return; }
    chooseImportMode(inc, 'file "' + f.name + '"');
  };
  rd.readAsText(f, 'utf-8');
}
function chooseImportMode(inc, srcDesc) {
  showModal('Nhập dữ liệu', 'Nhập từ ' + esc(srcDesc) + ' (' + (inc.phieu || []).length + ' phiếu, ' + (inc.unc || []).length + ' UNC).<br><br><b>Ghi đè</b>: thay toàn bộ dữ liệu hiện tại bằng dữ liệu trong file.<br><b>Gộp</b>: chỉ thêm phiếu chưa có (bỏ qua phiếu trùng số).', [
    { text: 'Ghi đè toàn bộ', warn: true, onClick: function () { DB = inc; loadDBFix(); saveDB(); reRenderAllModules(); alert('Đã ghi đè dữ liệu.'); } },
    { text: 'Gộp (merge)', onClick: function () { const n = mergeData(inc); saveDB(); reRenderAllModules(); alert('Đã gộp: thêm ' + n.p + ' phiếu, ' + n.u + ' UNC.'); } },
    { text: 'Hủy', sec: true }
  ]);
}
function loadDBFix() {
  const d = defaultDB();
  for (const k in d) if (DB[k] === undefined) DB[k] = d[k];
  for (const k in d.settings) if (DB.settings[k] === undefined) DB.settings[k] = d.settings[k];
  migrateData();
}
function mergeData(inc) {
  let np = 0, nu = 0;
  const haveP = new Set(DB.phieu.map(p => p.loai + '|' + p.so));
  (inc.phieu || []).forEach(p => { if (!haveP.has(p.loai + '|' + p.so)) { DB.phieu.push(p); np++; } });
  const haveU = new Set(DB.unc.map(u => u.so));
  (inc.unc || []).forEach(u => { if (!haveU.has(u.so)) { DB.unc.push(u); nu++; } });
  for (const y in (inc.kpdp || {})) if (!DB.kpdp[y]) DB.kpdp[y] = inc.kpdp[y];
  const haveTV = new Set(DB.thamVieng.map(r => JSON.stringify(r)));
  (inc.thamVieng || []).forEach(r => { if (!haveTV.has(JSON.stringify(r))) DB.thamVieng.push(r); });
  for (const k in (inc.phuCap || {})) if (!DB.phuCap[k]) DB.phuCap[k] = inc.phuCap[k];
  const st = inc.settings || {};
  for (const y in (st.soDu || {})) if (!DB.settings.soDu[y]) DB.settings.soDu[y] = st.soDu[y];
  for (const y in (st.chiTieu || {})) if (!DB.settings.chiTieu[y]) DB.settings.chiTieu[y] = st.chiTieu[y];
  return { p: np, u: nu };
}
function reRenderAllModules() {
  document.querySelectorAll('.module').forEach(m => { m.innerHTML = ''; delete m.dataset.init; });
  goMod(currentMod);
}

/* ---------- Đồng bộ mây (Cloud Firestore REST) ---------- */
function cloudCfg() {
  const raw = ($('s_cloudcfg') ? $('s_cloudcfg').value : DB.settings.cloud.cfg || '').trim();
  if (!raw) return null;
  let cfg = null;
  try { cfg = JSON.parse(raw); }
  catch (e) {
    try { cfg = (new Function('return (' + raw + ')'))(); } catch (e2) { return null; }
  }
  if (!cfg || !cfg.projectId || !cfg.apiKey) return null;
  return cfg;
}
function cloudUrl(cfg) {
  return 'https://firestore.googleapis.com/v1/projects/' + encodeURIComponent(cfg.projectId) + '/databases/(default)/documents/congdoan/data?key=' + encodeURIComponent(cfg.apiKey);
}
function cloudMsg(txt, ok) {
  const el = $('cloudMsg'); if (!el) { alert(txt); return; }
  el.className = 'msg ' + (ok ? 'ok' : 'err');
  el.textContent = txt;
}
function cloudPush() {
  if (!DB.settings.cloud.enabled) { cloudMsg('Đồng bộ mây đang TẮT. Hãy bật công tắc trước.', false); return; }
  const cfg = cloudCfg();
  if (!cfg) { cloudMsg('Chưa cấu hình hợp lệ. Hãy dán object cấu hình có apiKey và projectId rồi Lưu cài đặt.', false); return; }
  DB.settings.cloud.cfg = $('s_cloudcfg').value.trim(); saveDB();
  const json = JSON.stringify(DB);
  if (json.length > 950000) { cloudMsg('Dữ liệu quá lớn để đồng bộ mây (' + Math.round(json.length / 1024) + ' KB > giới hạn ~950 KB của Firestore). Hãy giảm bớt file đính kèm, hoặc chia sẻ bằng Xuất/Nhập file.', false); return; }
  cloudMsg('Đang đẩy dữ liệu lên mây…', true);
  fetch(cloudUrl(cfg), {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ fields: { json: { stringValue: json }, updatedAt: { stringValue: new Date().toISOString() }, updatedBy: { stringValue: navigator.userAgent.slice(0, 60) } } })
  }).then(res => {
    if (!res.ok) return res.text().then(t => { throw new Error('HTTP ' + res.status + ': ' + t.slice(0, 300)); });
    DB.settings.cloud.lastPush = new Date().toLocaleString('vi-VN');
    saveDB();
    if ($('lastPush')) $('lastPush').textContent = DB.settings.cloud.lastPush;
    cloudMsg('Đã đẩy dữ liệu lên mây thành công lúc ' + DB.settings.cloud.lastPush + ' ✓', true);
  }).catch(e => {
    cloudMsg('Lỗi khi đẩy lên mây: ' + e.message + '\nKiểm tra kết nối mạng, cấu hình project và quyền ghi (Firestore rules).', false);
  });
}
function cloudPull() {
  if (!DB.settings.cloud.enabled) { cloudMsg('Đồng bộ mây đang TẮT. Hãy bật công tắc trước.', false); return; }
  const cfg = cloudCfg();
  if (!cfg) { cloudMsg('Chưa cấu hình hợp lệ. Hãy dán object cấu hình có apiKey và projectId rồi Lưu cài đặt.', false); return; }
  cloudMsg('Đang tải dữ liệu từ mây…', true);
  fetch(cloudUrl(cfg)).then(res => {
    if (res.status === 404) throw new Error('Chưa có dữ liệu trên mây (document congdoan/data chưa tồn tại). Máy kia cần bấm "Đẩy lên mây" trước.');
    if (!res.ok) return res.text().then(t => { throw new Error('HTTP ' + res.status + ': ' + t.slice(0, 300)); });
    return res.json();
  }).then(doc => {
    const json = doc && doc.fields && doc.fields.json && doc.fields.json.stringValue;
    if (!json) throw new Error('Document trên mây không có dữ liệu hợp lệ.');
    const inc = JSON.parse(json);
    DB.settings.cloud.lastPull = new Date().toLocaleString('vi-VN');
    saveDB();
    if ($('lastPull')) $('lastPull').textContent = DB.settings.cloud.lastPull;
    const upd = doc.fields.updatedAt ? doc.fields.updatedAt.stringValue : '';
    chooseImportMode(inc, 'dữ liệu trên mây' + (upd ? ' (đẩy lúc ' + new Date(upd).toLocaleString('vi-VN') + ')' : ''));
  }).catch(e => {
    cloudMsg('Lỗi khi tải từ mây: ' + e.message + '\nKiểm tra kết nối mạng và cấu hình.', false);
  });
}
